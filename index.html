function renderWeeklySnapshotPanel() {
  const today = todayISO();
  const thisMon = mondayOf(today);
  const lastMon = addDays(thisMon, -7);

  // This week + previous for comparison; plus 8 weeks back for the table
  const thisWeek = weekSnapshot(thisMon);
  const lastWeek = weekSnapshot(lastMon);
  const weeks = [];
  for (let i = 0; i < 8; i++) weeks.push(weekSnapshot(addDays(thisMon, -7 * i)));

/** Build the auto-narrative — picks the most useful comparisons and
 *  turns them into a short headline + a few trend lines + 0–3 notes.
 *  Pure function of the two snapshots: no medical advice added. */
function buildWeekNarrative(thisWeek, lastWeek) {
  const t = thisWeek, l = lastWeek;
  const out = { heroNum: t.daysActive, heroLine: '', heroSub: '', trends: [], notes: [] };

  // Hero line
  const dWord = t.daysActive === 1 ? 'day' : 'days';
  out.heroLine = `${dWord} you showed up this week.`;
  if (t.daysActive === 7) out.heroLine = `days kept up — every day this week.`;
  else if (t.daysActive === 0) {
    out.heroLine = 'days logged yet this week.';
    out.heroNum = '–';
  }

  // Week-over-week comparison only makes sense once enough of this week
  // has elapsed. Mon–Wed of a fresh week always shows a "deficit" because
  // most days haven't happened yet — that's misleading, not informative.
  // Wait until Thursday (or Sunday, the last day of our Mon-start week).
  const dow = dayOfWeek(todayISO());      // Sun=0 Mon=1 ... Sat=6
  const weekIsMature = dow === 0 || dow >= 4;
  if (weekIsMature && l && l.daysActive > 0) {
    const diff = t.daysActive - l.daysActive;
    if (diff > 0)      out.heroSub = `Up ${diff} from last week.`;
    else if (diff < 0) out.heroSub = `Down ${Math.abs(diff)} from last week — that's okay.`;
    else               out.heroSub = `Same as last week.`;
  }

  // Trend rows — only show what's been logged this week
  const trendRow = (label, value, delta, deltaClass) => out.trends.push({ label, value, delta, deltaClass });
  const arrow = (a, b, unit, betterDirection = 'up') => {
    // Skip last-week comparisons early in a fresh week — same reasoning as
    // the heroSub gate above. Show this week's number, no delta.
    if (!weekIsMature) return { delta: '', cls: '' };
    if (b === null || b === undefined || b === 0) return { delta: '', cls: '' };
    const d = a - b;
    if (d === 0) return { delta: 'same as last week', cls: 'flat' };
    const up = d > 0;
    const arrowChar = up ? '↑' : '↓';
    const good = (betterDirection === 'up') === up;
    return { delta: `${arrowChar} ${Math.abs(d)}${unit ? ' ' + unit : ''}`, cls: good ? 'good' : 'flat' };
  };

  if (t.longestContinuous > 0) {
    const a = arrow(t.longestContinuous, l && l.longestContinuous, 'min', 'up');
    trendRow('Longest continuous activity', `${t.longestContinuous} min`, a.delta, a.cls);
  }
  if (t.totalProgrammed > 0) {
    const a = arrow(t.totalProgrammed, l && l.totalProgrammed, 'min', 'up');
    trendRow('Total programmed minutes', `${t.totalProgrammed} min`, a.delta, a.cls);
  }
  if (t.typicalBorg !== null && t.typicalBorg !== undefined) {
    // Lower Borg for similar work = good
    let delta = '', cls = '';
    if (weekIsMature && l && l.typicalBorg !== null && l.typicalBorg !== undefined) {
      const d = Math.round((t.typicalBorg - l.typicalBorg) * 10) / 10;
      if (d === 0) { delta = 'same as last week'; cls = 'flat'; }
      else if (d < 0 && t.totalProgrammed >= (l.totalProgrammed || 0) * 0.85) {
        delta = `easier (↓ ${Math.abs(d)})`; cls = 'good';
      } else if (d < 0) {
        delta = `↓ ${Math.abs(d)}`; cls = 'flat';
      } else {
        delta = `↑ ${d}`; cls = 'flat';
      }
    }
    trendRow('Typical effort', `Borg ${t.typicalBorg}`, delta, cls);
  }
  if (t.hrRange) {
    trendRow('Morning resting HR', `${t.hrRange[0]}–${t.hrRange[1]} bpm`, '', '');
  }

  // Notes — short, plain-language observations. Comparison notes only fire
  // once enough of the week has elapsed; standalone notes (symptoms, empty
  // week) still appear immediately because they describe what's happening
  // right now, not how it stacks up against last week.
  const notes = [];
  if (weekIsMature && l && t.longestContinuous > l.longestContinuous && l.longestContinuous > 0) {
    notes.push(`Endurance is building — your longest continuous activity is up ${t.longestContinuous - l.longestContinuous} minutes from last week.`);
  }
  if (weekIsMature && l && t.typicalBorg !== null && l.typicalBorg !== null &&
      t.typicalBorg < l.typicalBorg && t.totalProgrammed >= (l.totalProgrammed || 0) * 0.85) {
    notes.push("Same work, less effort — that's real fitness gain.");
  }
  if (t.anySymptoms) {
    notes.push("Some symptoms were noted this week — they're listed below in the day-by-day section.");
  }
  if (weekIsMature && t.daysActive >= 5 && (!l || l.daysActive < t.daysActive)) {
    notes.push('Strong consistency this week. Keep the rhythm.');
  }
  if (t.daysActive === 0) {
    notes.push("Nothing logged yet this week. Today's a fine day to start — even five minutes counts.");
  }
  out.notes = notes.slice(0, 3);

  return out;
}

function saveSettings() {
  const c = state.config;
  // Blank-respecting numeric parse: empty input → null, NOT 0. safeNum
  // returns 0 for '' because Number('') === 0, which would silently turn
  // every "no range set" into "ceiling is 0" and flag every reading.
  const nullableNum = (id) => {
    const raw = ((document.getElementById(id)||{}).value || '').trim();
    if (raw === '') return null;
    const n = Number(raw);
    return Number.isFinite(n) ? n : null;
  };
  const dayTh = nullableNum('cfg-th-day');
  const weekTh = nullableNum('cfg-th-week');
  const newCfg = {
    currentStage: Number(document.getElementById('cfg-stage').value),
    weeklyPlan: ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].reduce((o, d) => {
      o[d] = document.getElementById('cfg-plan-' + d).value;
      return o;
    }, {}),
    weeklyGoal: document.getElementById('cfg-goal').value.trim(),
    medications: document.getElementById('cfg-meds').value
      .split('\n').map(s => s.trim()).filter(Boolean),
    medsTrackingEnabled: document.getElementById('cfg-meds-toggle').checked,
    weightTrackingEnabled: document.getElementById('cfg-weight-toggle').checked,
    weightBaselineLb: safeNum(document.getElementById('cfg-weight-baseline').value),
    thresholds: {
      ...c.thresholds,
      weightGainPerDayLb: dayTh != null ? dayTh : PLAN_THRESHOLDS.weightGainPerDayLb,
      weightGainPerWeekLb: weekTh != null ? weekTh : PLAN_THRESHOLDS.weightGainPerWeekLb
    },
    doctorRanges: {
      ...c.doctorRanges,
      hrFloor:   nullableNum('cfg-hr-floor'),
      hrCeiling: nullableNum('cfg-hr-ceiling'),
      bsFasting:  { low: nullableNum('cfg-bs-fasting-low'),  high: nullableNum('cfg-bs-fasting-high') },
      bsPostMeal: { low: nullableNum('cfg-bs-postMeal-low'), high: nullableNum('cfg-bs-postMeal-high') },
      bsBedtime:  { low: nullableNum('cfg-bs-bedtime-low'),  high: nullableNum('cfg-bs-bedtime-high') }
    },
    theme: document.getElementById('cfg-theme').value,
    textSize: document.getElementById('cfg-textsize').value,
    sheetUrl: document.getElementById('cfg-sheet-url').value.trim()
  };
  setConfig(newCfg);
  applyAppearance();
  switchView('today');
}

  // Apply theme + text-size classes to <html>, not <body>. Both html
  // and body have `background: var(--bg)`, but body's CSS-var override
  // wouldn't affect html's bg paint, so the page would show two colors
  // (bug fixed here). Putting the class on <html> themes both.
  const root = document.documentElement;
  root.className = '';
  if (state.config.theme && state.config.theme !== 'default') {
    root.classList.add('theme-' + state.config.theme);
  }
  if (state.config.textSize && state.config.textSize !== 'normal') {
    root.classList.add('text-' + state.config.textSize);
  }
  // Re-render charts so they pick up the new themed colors
  if (activeView === 'trends' && trendsTab === 'charts') {
    setTimeout(() => { try { drawAllCharts(); } catch(e) {} }, 0);
  }
}

async function testSync() {
  const url = document.getElementById('cfg-sheet-url').value.trim();
  const out = document.getElementById('sync-test-result');
  if (!url) { out.textContent = 'Paste a URL first.'; return; }
  out.textContent = 'Testing…';
  try {
    const res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action: 'ping' }),
      redirect: 'follow'
    });
    const data = await res.json();
    if (data.ok && data.pong) {
      out.innerHTML = '<span style="color:var(--success)">✓ Connected.</span>';
    } else {
      out.innerHTML = '<span style="color:var(--signal-ink)">Got a response but it didn\'t look right: ' + escapeHtml(JSON.stringify(data)) + '</span>';
    }
  } catch (e) {
    out.innerHTML = '<span style="color:var(--signal-ink)">Could not reach: ' + escapeHtml(e.message) + '</span>';
  }
}

function downloadJson() {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  triggerDownload(blob, `conditioning-backup-${todayISO()}.json`);
}

function downloadCsv() {
  // One CSV per type. Stagger downloads ~300ms apart so browsers don't
  // treat the rapid succession as a popup-spam pattern and block them.
  const types = ['vitals','activity','ekg','bloodSugar','symptoms','stageDecisions','doctorNotes'];
  types.forEach((type, i) => {
    const rows = state[type];
    if (rows.length === 0) return;
    setTimeout(() => {
      const headers = Array.from(new Set(rows.flatMap(r => Object.keys(r))));
      const csv = [
        headers.join(','),
        ...rows.map(r => headers.map(h => csvCell(r[h])).join(','))
      ].join('\n');
      const blob = new Blob([csv], { type: 'text/csv' });
      triggerDownload(blob, `conditioning-${type}-${todayISO()}.csv`);
    }, i * 300);
  });
}
function csvCell(v) {
  if (v === null || v === undefined) return '';
  const s = (typeof v === 'object') ? JSON.stringify(v) : String(v);
  if (/[",\n]/.test(s)) return '"' + s.replace(/"/g, '""') + '"';
  return s;
}
function triggerDownload(blob, name) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = name;
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { URL.revokeObjectURL(a.href); a.remove(); }, 100);
}

/* ─── Demo data — for visualizing the app before real entries exist ───
 * Loads ~6 weeks of believable entries showing a trajectory through
 * Stage 0 → 1 → 2: pool sessions whose "longest continuous" climbs,
 * Borg holding steady (= work feeling relatively easier), a couple of
 * symptom events so the EKG dots and the narrative can react.
 *
 * Demo entries are marked `_demo: true` and are NEVER synced to the
 * sheet — they stay in localStorage only and can be wiped in one click.
 */
function loadDemoData() {
  const existing = state.vitals.length + state.activity.length + state.ekg.length + state.bloodSugar.length;
  const msg = existing > 0
    ? 'Add ~6 weeks of demo data on top of what you already have? You can clear it later. Demo entries are local only — they will NOT sync to the Google Sheet.'
    : 'Load ~6 weeks of demo data so you can see how the charts and weekly summary will look? Stays on this device — does not sync.';
  if (!confirm(msg)) return;

  const today = todayISO();
  const start = addDays(today, -41);   // 6 weeks back, inclusive
  const demoRestDays = [];

  // Tiny seeded PRNG so the demo is deterministic across loads
  let seed = 12345;
  const rand = () => { seed = (seed * 9301 + 49297) % 233280; return seed / 233280; };

  const push = (type, rec) => {
    rec.id = uuid();
    rec.updatedAt = nowIso();
    rec.createdAt = rec.updatedAt;
    rec._demo = true;
    state[type].push(rec);
  };

  for (let i = 0; i <= 41; i++) {
    const date = addDays(start, i);
    const dow = dayOfWeek(date);
    const isSunday    = dow === 0;
    const isMonWedFri = dow === 1 || dow === 3 || dow === 5;
    const isTueThu    = dow === 2 || dow === 4;
    const isSaturday  = dow === 6;

    /* Morning vitals — most days. HR drifts down a touch over time
       (mild conditioning effect), with one symptomatic morning early on. */
    if (rand() > 0.12) {
      const hrBase = 52 - (i / 41) * 4;
      const hr = Math.round(hrBase + (rand() - 0.5) * 6);
      push('vitals', {
        date,
        restingHR: hr,
        dizzy: i === 4,
        swelling: false,
        breathing: false,
        symptomNote: i === 4 ? 'Felt lightheaded standing from a chair this morning' : ''
      });
    }

    /* Activity — stage-appropriate */
    if (i < 7) {
      // STAGE 0: baseline. Mostly daily activities + a couple of short pool sessions.
      if (rand() > 0.3) {
        push('activity', {
          date, category: 'daily',
          subtypes: rand() > 0.5 ? ['Housework'] : ['Caring for the cats'],
          totalMinutes: 20 + Math.round(rand() * 30),
          rounds: 1, minutesPerRound: 20,
          isProgrammed: false, note: ''
        });
      }
      if (i === 1 || i === 4) {
        push('activity', {
          date, category: 'pool',
          subtypes: ['Water walking'],
          totalMinutes: 9, rounds: 3, minutesPerRound: 3, restBetweenMin: 2,
          borg: 11, talkTestOK: true, feeling: 4,
          isProgrammed: true, note: ''
        });
      }
    } else if (i < 21) {
      // STAGE 1: structured week — 3 pool, 2 strength, Sat free, Sun rest.
      if (isSunday) demoRestDays.push(date);
      else if (isMonWedFri) {
        const mpr = 3 + Math.floor((i - 7) / 5);   // 3 → 5 min/round over two weeks
        const noteVariant = (i === 14) ? 'First time I forgot to count rounds because I was chatting with someone in the pool' : '';
        push('activity', {
          date, category: 'pool',
          subtypes: ['Water walking'].concat(i > 14 ? ['Gentle marching'] : []),
          totalMinutes: mpr * 3, rounds: 3, minutesPerRound: mpr, restBetweenMin: 2,
          borg: 11, talkTestOK: true, feeling: 4,
          isProgrammed: true, note: noteVariant
        });
      } else if (isTueThu) {
        push('activity', {
          date, category: 'strength',
          subtypes: ['Sit-to-stands', 'Heel raises', 'Ankle pumps'],
          totalMinutes: 12, rounds: 1, minutesPerRound: 12,
          borg: 10, talkTestOK: true, feeling: 4,
          isProgrammed: true, note: ''
        });
      }
    } else {
      // STAGE 2: same shape, longer continuous + a Saturday outdoor walk.
      if (isSunday) demoRestDays.push(date);
      else if (isMonWedFri) {
        const mpr = 8 + Math.floor((i - 21) / 7);  // 8 → 11 min/round
        push('activity', {
          date, category: 'pool',
          subtypes: ['Water walking', 'Gentle marching', 'Slow arm sweeps'],
          totalMinutes: mpr * 2, rounds: 2, minutesPerRound: mpr, restBetweenMin: 1,
          borg: 11 + (rand() > 0.75 ? 1 : 0),
          talkTestOK: true,
          feeling: 4 + (rand() > 0.5 ? 1 : 0),
          isProgrammed: true,
          note: i === 35 ? 'Felt actually easy today' : ''
        });
      } else if (isTueThu) {
        push('activity', {
          date, category: 'strength',
          subtypes: ['Sit-to-stands', 'Heel raises', 'Wall push-ups', 'Standing hip lifts'],
          totalMinutes: 18, rounds: 2, minutesPerRound: 9,
          borg: 11, talkTestOK: true, feeling: 4,
          isProgrammed: true, note: ''
        });
      } else if (isSaturday && rand() > 0.45) {
        push('activity', {
          date, category: 'walking',
          subtypes: ['Outdoor walking'],
          totalMinutes: 15, rounds: 1, minutesPerRound: 15,
          borg: 11, talkTestOK: true, feeling: 5,
          isProgrammed: true, note: 'Around the block twice — felt great'
        });
      }
    }

    /* EKG — morning baseline most days, plus one symptomatic afib reading
       early on and one device-flagged unclassified mid-cycle. */
    if (rand() > 0.4) {
      const hr = 48 + Math.round(rand() * 8);
      push('ekg', {
        dateTime: date + 'T07:30:00',
        rate: hr,
        rhythm: i === 4 ? 'afib' : (i === 18 ? 'unclassified' : 'normal'),
        symptomatic: i === 4,
        note: i === 4 ? 'Took this right after feeling lightheaded — sent to cardiologist' :
              i === 18 ? 'Device flagged but I felt fine' : ''
      });
    }

    /* Blood sugar — 1–3 readings per day across contexts */
    if (rand() > 0.2) {
      push('bloodSugar', {
        dateTime: date + 'T07:00:00',
        value: 96 + Math.round(rand() * 22),
        context: 'fasting', note: ''
      });
    }
    if (rand() > 0.5) {
      push('bloodSugar', {
        dateTime: date + 'T13:30:00',
        value: 145 + Math.round(rand() * 40),
        context: 'post-meal', note: ''
      });
    }
    if (rand() > 0.6) {
      push('bloodSugar', {
        dateTime: date + 'T22:00:00',
        value: 108 + Math.round(rand() * 28),
        context: 'bedtime', note: ''
      });
    }
  }

  /* Weekly stage decisions to show what the history looks like */
  const wk2 = mondayOf(addDays(today, -28));
  const wk3 = mondayOf(addDays(today, -21));
  const wk5 = mondayOf(addDays(today, -7));
  push('stageDecisions', {
    weekStartDate: wk2, stage: 1, choice: 'hold',
    criteriaTicked: [true, true, false, false],
    note: 'Feeling steady but want another week at Stage 1'
  });
  push('stageDecisions', {
    weekStartDate: wk3, stage: 1, choice: 'advance',
    criteriaTicked: [true, true, true, true],
    note: 'Talked with cardiologist, cleared to lengthen sessions'
  });
  push('stageDecisions', {
    weekStartDate: wk5, stage: 2, choice: 'hold',
    criteriaTicked: [true, false, true, true],
    note: ''
  });

  /* Merge config bits — directly, NOT via setConfig (we don't want
     these queued for sync since they're demo). */
  state.config.restDays = [...(state.config.restDays || []), ...demoRestDays];
  state.config._demoRestDays = demoRestDays;
  state.config.currentStage = 2;
  if (!state.config.weeklyGoal) state.config.weeklyGoal = '3 pool days, 2 strength days';

  saveState();
  alert('Demo data loaded.\n\nTap Today to see the day strip and streak, then Trends → Weekly snapshot for the auto-generated summary.');
  renderActiveView();
}

function clearDemoData() {
  const demoCount = ['vitals','activity','ekg','bloodSugar','stageDecisions','doctorNotes']
    .reduce((s, t) => s + state[t].filter(r => r._demo).length, 0);
  if (demoCount === 0) { alert('No demo data to clear.'); return; }
  if (!confirm(`Remove ${demoCount} demo entries? Real entries you've logged will be kept.`)) return;
  ['vitals','activity','ekg','bloodSugar','stageDecisions','doctorNotes'].forEach(t => {
    state[t] = state[t].filter(r => !r._demo);
  });
  const demoRest = state.config._demoRestDays || [];
  state.config.restDays = (state.config.restDays || []).filter(d => !demoRest.includes(d));
  state.config._demoRestDays = [];
  saveState();
  alert('Demo data cleared.');
  renderActiveView();
}

function importJson(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (!confirm('Replace all current entries with the backup file? Local entries will be overwritten.')) return;
      ['vitals','activity','ekg','bloodSugar','stageDecisions','doctorNotes'].forEach(t => {
        if (Array.isArray(data[t])) state[t] = data[t];
      });
      if (data.config) state.config = { ...DEFAULT_CONFIG, ...data.config, sheetUrl: state.config.sheetUrl };
      saveState();
      renderActiveView();
      alert('Imported.');
    } catch (e) {
      alert('Could not read that file: ' + e.message);
    }
  };
  reader.readAsText(file);
}

  {

/* ─── 2. State + LocalStorage ─────────────────────────────────────
   Single root state object persisted under one key. Local is the
   source of truth; sync just mirrors to the Google Sheet. */

const LS_KEY = 'conditioning.v1';

const DEFAULT_CONFIG = {
  currentStage: 0,
  weeklyPlan: { ...DEFAULT_WEEKLY_PLAN },
  weeklyGoal: '',
  medications: [],
  doctorRanges: {
    hrFloor: null, hrCeiling: null,

  },
  thresholds: {

    // mirror PLAN_THRESHOLDS so existing installs behave identically.
    weightGainPerDayLb: 2.5,
    weightGainPerWeekLb: 5
  },
  weightTrackingEnabled: false,
  weightBaselineLb: null,
  medsTrackingEnabled: false,
  theme: 'default',       // default | warm | soft | contrast | dark
  textSize: 'normal',     // normal | large | xlarge
  firstRunComplete: false,
  restDays: [],           // array of YYYY-MM-DD logged as rest (planned or symptom-driven)
  sheetUrl: '',
  lastMondayPromptWeek: ''  // ISO Monday of the most recent week we showed the prompt
};

// `var` (not `let`) so the binding is reachable on `window` — tests.html
// loads this file in an iframe and injects fixture state via `app.state = ...`.
var state = {
  vitals: [],
  activity: [],
  ekg: [],
  bloodSugar: [],
  symptoms: [],      // standalone symptom events (at rest, outside sessions)
  stageDecisions: [],
  doctorNotes: [],   // free-form questions/notes for the cardiologist;
                     // excluded from Today/Log lists + Trends, included in print
  config: { ...DEFAULT_CONFIG },
  unsynced: [],
  lastSyncAt: null
};

/* Generate a stable id for entries */
const uuid = () =>
  (crypto && crypto.randomUUID)
    ? crypto.randomUUID()
    : 'id-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 10);

const nowIso = () => new Date().toISOString();

function loadState() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return;
    const parsed = JSON.parse(raw);
    // Merge config so new defaults appear after upgrades
    state = {
      ...state,
      ...parsed,
      config: { ...DEFAULT_CONFIG, ...(parsed.config || {}) }
    };
  } catch (e) {
    console.warn('Could not load state:', e);
  }
}

function saveState() {
  try {
    localStorage.setItem(LS_KEY, JSON.stringify(state));
  } catch (e) {
    console.warn('Could not save state:', e);
  }
}

/* Upsert / delete helpers that also queue a sync op */
function upsertEntry(type, record) {
  record.id = record.id || uuid();
  record.updatedAt = nowIso();
  record.createdAt = record.createdAt || record.updatedAt;
  const list = state[type];
  const i = list.findIndex(r => r.id === record.id);
  if (i >= 0) list[i] = record;
  else list.push(record);
  queueSync({ op: 'save', type, record });
  saveState();
  return record;
}

function deleteEntry(type, id) {
  state[type] = state[type].filter(r => r.id !== id);
  queueSync({ op: 'delete', type, id });
  saveState();
}

function setConfig(patch) {
  state.config = { ...state.config, ...patch };
  Object.entries(patch).forEach(([key, value]) => {
    queueSync({ op: 'saveConfig', key, value });
  });
  saveState();
}

/* ─── 3. Sync layer ───────────────────────────────────────────────
   POST with Content-Type: text/plain so Apps Script doesn't get
   hit with a CORS preflight it can't answer. Failed ops stay in
   the queue and retry on next opportunity. */

function queueSync(op) {
  op.id = uuid();
  op.attempts = 0;
  state.unsynced.push(op);
  saveState();
  // Coalesce: flush after a short delay so rapid typing doesn't spam
  scheduleFlush();
}

let flushTimer = null;
function scheduleFlush() {
  if (flushTimer) return;
  flushTimer = setTimeout(() => {
    flushTimer = null;
    flushSync();
  }, 500);
}

async function postOp(op) {
  const url = state.config.sheetUrl;
  if (!url) throw new Error('No sheet URL configured');
  let body;
  if (op.op === 'save') body = { action: 'save', type: op.type, record: op.record };
  else if (op.op === 'delete') body = { action: 'delete', type: op.type, id: op.id };
  else if (op.op === 'saveConfig') body = { action: 'saveConfig', key: op.key, value: op.value };
  else throw new Error('Unknown op: ' + op.op);

  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(body),
    redirect: 'follow'
  });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  const data = await res.json();
  if (!data.ok) throw new Error(data.error || 'Apps Script returned ok:false');
  return data;
}

let syncing = false;
async function flushSync() {
  if (syncing) return;
  if (!state.config.sheetUrl) { updateSyncIndicator('offline'); return; }
  if (state.unsynced.length === 0) { updateSyncIndicator('synced'); return; }
  syncing = true;
  updateSyncIndicator('syncing');
  try {
    while (state.unsynced.length > 0) {
      const op = state.unsynced[0];
      try {
        await postOp(op);
        state.unsynced.shift();
        saveState();
      } catch (e) {
        op.attempts = (op.attempts || 0) + 1;
        if (op.attempts >= 3) {
          // Park this op for later and continue with the rest
          state.unsynced.shift();
          state.unsynced.push(op);
          saveState();
          updateSyncIndicator('error', e.message);
          syncing = false;
          return;
        }
        saveState();
        updateSyncIndicator('error', e.message);
        syncing = false;
        return;
      }
    }
    state.lastSyncAt = nowIso();
    saveState();
    updateSyncIndicator('synced');
  } finally {
    syncing = false;
  }
}

/** Pull a snapshot from the sheet (used on first connect / manual refresh).
 *  Local data wins on id conflicts to avoid stomping unsynced entries. */
async function pullFromSheet() {
  const url = state.config.sheetUrl;
  if (!url) return { ok: false, error: 'No sheet URL' };
  updateSyncIndicator('syncing');
  try {
    const res = await fetch(url + '?t=' + Date.now(), { method: 'GET', redirect: 'follow' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if (!data.ok) throw new Error(data.error);
    ['vitals','activity','ekg','bloodSugar','symptoms','stageDecisions','doctorNotes'].forEach(type => {
      const remote = data[type] || [];
      const byId = new Map((state[type] || []).map(r => [r.id, r]));
      remote.forEach(r => { if (r.id && !byId.has(r.id)) byId.set(r.id, r); });
      state[type] = Array.from(byId.values());
    });
    if (data.config && Object.keys(data.config).length > 0) {
      state.config = { ...DEFAULT_CONFIG, ...data.config, sheetUrl: state.config.sheetUrl };
    }
    state.lastSyncAt = nowIso();
    saveState();
    updateSyncIndicator('synced');
    return { ok: true };
  } catch (e) {
    updateSyncIndicator('error', e.message);
    return { ok: false, error: e.message };
  }
}

function updateSyncIndicator(status, msg) {
  const dot = document.getElementById('sync-dot');
  const text = document.getElementById('sync-text');
  if (!dot || !text) return;
  dot.className = '';
  dot.classList.add(status);
  const pending = state.unsynced.length;
  // Keep this gentle — never raw counts. Status word only, and only
  // when there's something worth saying.
  if (status === 'synced')        text.textContent = '';
  else if (status === 'syncing')  text.textContent = 'saving';
  else if (status === 'offline')  text.textContent = state.config.sheetUrl ? 'offline' : '';
  else if (status === 'error')    text.textContent = 'retry';
  // Hover tooltip still shows pending count for diagnosis
  const reason = msg ? ` — ${msg}` : '';
  const pendingNote = pending ? ` · ${pending} entr${pending===1?'y':'ies'} waiting` : '';
  dot.title =
    status === 'synced'  ? 'Synced to Google Sheet' + pendingNote :
    status === 'syncing' ? 'Saving…' + pendingNote :
    status === 'offline' ? (state.config.sheetUrl ? 'Offline — entries saved on this device' + pendingNote : 'Not connected to a sheet — entries stay on this device') :
    status === 'error'   ? 'Sync paused, will retry' + reason + pendingNote :
    '';
}
</script>

<script>
/* ─── 6. Modal infrastructure ───────────────────────────────────── */

let modalEscHandler = null;

function openModal(html, opts = {}) {
  const mount = document.getElementById('modal-mount');
  const full = opts.full ? 'full' : '';
  mount.innerHTML = `
    <div class="modal-backdrop open" onclick="if(event.target===this) closeModal()">
      <div class="modal ${full}" role="dialog" aria-modal="true">${html}</div>
    </div>
  `;
  modalEscHandler = (e) => { if (e.key === 'Escape') closeModal(); };
  document.addEventListener('keydown', modalEscHandler);
}

function closeModal() {
  document.getElementById('modal-mount').innerHTML = '';
  if (modalEscHandler) document.removeEventListener('keydown', modalEscHandler);
  modalEscHandler = null;
}

/* ─── 6a. Log forms ─────────────────────────────────────────────── */

function openLog(type, prefill) {
  if (type === 'vitals')     return openVitalsForm(prefill);
  if (type === 'activity')   return openActivityForm(prefill);
  if (type === 'ekg')        return openEkgForm(prefill);
  if (type === 'bloodSugar') return openBloodSugarForm(prefill);
  if (type === 'symptoms')   return openSymptomForm(prefill);
}

/** VITALS */
function openVitalsForm(prefill) {

  const c = state.config;
  const linkedEkg = (r.morningEkgId && state.ekg.find(e => e.id === r.morningEkgId)) || null;
  const html = `
    <div class="modal-head">

            <button type="button" class="chip ${linkedEkg && linkedEkg.rhythm === rl ? 'selected' : ''}" data-rhythm="${rl}">${rl}</button>
          `).join('')}

        <label class="field">

      <div class="field">
        <span class="lbl">Symptoms this morning</span>
        ${renderToggleRow('dizzy', 'Dizzy or lightheaded', asBool(r.dizzy))}

      ${c.medsTrackingEnabled ? `
        <div class="field">
          ${renderToggleRow('tookMeds', 'Took today\'s medications', asBool(r.tookMeds))}

      ` : ''}
    </div>
    <div class="modal-foot">
      ${prefill ? `<button class="btn danger" onclick="deleteAndClose('vitals','${prefill.id}')">Delete</button>` : ''}

  openModal(html);

}

/* Single-select rhythm chips that can also be cleared by tapping the
 * selected one again (so an accidental tap doesn't force an EKG record). */
function wireEkgRhythmChips() {
  document.querySelectorAll('#f-ekg-rhythm-chips .chip').forEach(el => {
    el.addEventListener('click', () => {
      const was = el.classList.contains('selected');
      document.querySelectorAll('#f-ekg-rhythm-chips .chip').forEach(x => x.classList.remove('selected'));
      if (!was) el.classList.add('selected');
    });
  });
}

/* If the open form's optional EKG section was filled in, upsert the
 * linked ekg record and return its id (or the prior id when editing).
 * Returns the existing linkedId untouched when the fields are blank. */
function saveLinkedEkg(linkedId, dateTime, { symptomatic, defaultNote }) {
  const rate = safeNum(document.getElementById('f-ekg-rate').value);
  const sel = document.querySelector('#f-ekg-rhythm-chips .chip.selected');
  if (rate === null && !sel) return linkedId;
  const prior = linkedId ? state.ekg.find(e => e.id === linkedId) : null;
  const rec = upsertEntry('ekg', {
    id: prior ? prior.id : undefined,
    dateTime: prior ? prior.dateTime : dateTime,
    rate,
    rhythm: sel ? sel.dataset.rhythm : (prior ? prior.rhythm : 'unclassified'),
    symptomatic: prior ? asBool(prior.symptomatic) || !!symptomatic : !!symptomatic,
    note: prior && prior.note ? prior.note : defaultNote
  });
  return rec.id;
}

function saveVitalsForm(existingId) {
  const c = state.config;
  const prior = existingId ? state.vitals.find(v => v.id === existingId) : null;
  const record = {
    id: existingId || undefined,
    date: document.getElementById('f-date').value,
    restingHR: safeNum(document.getElementById('f-hr').value),
    dizzy: toggleVal('dizzy'),
    swelling: toggleVal('swelling'),
    breathing: toggleVal('breathing'),
    symptomNote: document.getElementById('f-note').value.trim(),
    morningEkgId: prior ? prior.morningEkgId : undefined
  };
  if (c.weightTrackingEnabled) {
    record.weight = safeNum(document.getElementById('f-weight').value);
  }
  if (c.medsTrackingEnabled) {
    record.tookMeds = toggleVal('tookMeds');
  }
  if (!existingId) {
    const existing = state.vitals.find(v => v.date === record.date);
    if (existing) {
      record.id = existing.id;
      record.morningEkgId = record.morningEkgId || existing.morningEkgId;
    }
  }
  // New morning EKGs get a morning-ish timestamp: "now" if logging today,
  // otherwise 8am on the entry's date.
  const now = new Date();
  const localNow = new Date(now - now.getTimezoneOffset() * 60000).toISOString().slice(0, 19);
  const ekgWhen = record.date === todayISO() ? localNow : record.date + 'T08:00:00';
  record.morningEkgId = saveLinkedEkg(record.morningEkgId, ekgWhen, {
    symptomatic: false,
    defaultNote: 'Morning reading (logged with vitals)'
  });
  upsertEntry('vitals', record);
  closeModal();
  flushSync();
  renderActiveView();
}

/** ACTIVITY */
function openActivityForm(prefill) {
  const r = prefill || { date: todayISO(), category: 'pool', subtypes: [], rounds: 1 };
  const subs = Array.isArray(r.subtypes) ? r.subtypes : (typeof r.subtypes === 'string' ? safeParseArray(r.subtypes) : []);
  const html = `
    <div class="modal-head">
      <h2>${prefill ? 'Edit' : 'Log'} activity</h2>
      <button class="icon-btn" onclick="closeModal()" aria-label="Close">✕</button>
    </div>
    <div class="modal-body">
      <label class="field">
        <span class="lbl">Date</span>
        <input type="date" id="f-date" value="${escapeHtml(r.date || todayISO())}" />
      </label>

      <div class="field">
        <span class="lbl">What kind?</span>
        <div class="chips" id="f-cat-chips">
          ${Object.entries(ACTIVITY_CATEGORIES).map(([k, v]) => `
            <button type="button" class="chip ${r.category === k ? 'selected' : ''}" data-cat="${k}">${escapeHtml(v.label)}</button>
          `).join('')}
        </div>
      </div>

      <div id="f-subtype-wrap"></div>
      <div id="f-bouts-wrap"></div>
    </div>
    <div class="modal-foot">
      ${prefill ? `<button class="btn danger" onclick="deleteAndClose('activity','${prefill.id}')">Delete</button>` : ''}
      <button class="btn ghost" onclick="closeModal()">Cancel</button>
      <button class="btn primary" onclick="saveActivityForm('${prefill ? prefill.id : ''}')">Save</button>
    </div>
  `;
  openModal(html);

  let currentCat = r.category;
  let currentSubs = subs.slice();

  const renderSubtypeAndBouts = () => {
    const subWrap = document.getElementById('f-subtype-wrap');
    const boutsWrap = document.getElementById('f-bouts-wrap');
    const cat = ACTIVITY_CATEGORIES[currentCat];
    if (!cat) { subWrap.innerHTML = ''; boutsWrap.innerHTML = ''; return; }

    if (currentCat === 'rest') {
      subWrap.innerHTML = `<div class="card soft small italic">Rest day — nothing else to log here. Save to record it.</div>`;
      boutsWrap.innerHTML = '';
      return;
    }
    subWrap.innerHTML = `
      <div class="field">
        <span class="lbl">What did you do? <span class="small">(pick all that apply)</span></span>
        <div class="chips" id="f-sub-chips">
          ${cat.subtypes.map(st => `
            <button type="button" class="chip ${currentSubs.includes(st) ? 'selected' : ''}" data-sub="${escapeHtml(st)}">${escapeHtml(st)}</button>
          `).join('')}
        </div>
      </div>
    `;
    document.querySelectorAll('#f-sub-chips .chip').forEach(el => {
      el.addEventListener('click', () => {
        const st = el.dataset.sub;
        if (currentSubs.includes(st)) currentSubs = currentSubs.filter(x => x !== st);
        else currentSubs.push(st);
        el.classList.toggle('selected');
      });
    });

    boutsWrap.innerHTML = `
      <div class="field">
        <span class="lbl">How long?</span>
        <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px;">
          <label><span class="small">Total min</span>
            <input type="number" inputmode="numeric" id="f-total" value="${escapeHtml(r.totalMinutes ?? '')}" />
          </label>
          <label><span class="small">Rounds</span>
            <input type="number" inputmode="numeric" id="f-rounds" value="${escapeHtml(r.rounds ?? 1)}" min="1" />
          </label>
          <label><span class="small">Min / round</span>
            <input type="number" inputmode="numeric" id="f-mpr" value="${escapeHtml(r.minutesPerRound ?? '')}" />
          </label>
        </div>
        <span class="help">e.g., 3 rounds × 5 min = 15 total. Min/round is what counts as your "continuous" duration on the staircase chart.</span>
        <label style="margin-top:8px; display:block;"><span class="small">Rest between rounds (min, optional)</span>
          <input type="number" inputmode="numeric" id="f-rest" value="${escapeHtml(r.restBetweenMin ?? '')}" />
        </label>
      </div>

      ${cat.programmed ? `
      <div class="field">
        <span class="lbl">Borg effort</span>
        <div class="borg-grid" id="f-borg-grid">
          ${BORG_SCALE.map(b => `
            <div class="borg-row ${b.tier === 'too-hard' ? 'too-hard' : ''} ${Number(r.borg) === b.n ? 'selected' : ''}" data-borg="${b.n}">
              <div class="num">${b.n}</div>
              <div class="desc">${escapeHtml(b.desc)}</div>
            </div>
          `).join('')}
        </div>
      </div>
      <div class="field">
        ${renderToggleRow('talkTestOK', 'Could hold a normal conversation throughout', r.talkTestOK !== false)}
      </div>
      <label class="field">
        <span class="lbl">Recovery HR (1 min after, optional)</span>
        <input type="number" inputmode="numeric" id="f-recovery-hr" value="${escapeHtml(r.recoveryHR ?? '')}" placeholder="pulse one minute after stopping" />
        <span class="help">A useful cardiac signal — faster recovery over time means real fitness gain.</span>
      </label>
      <div class="field">
        <span class="lbl">How did the session feel?</span>
        <div class="feeling-row" id="f-feeling-row">
          ${[
            [1, '😞', 'rough'],
            [2, '🙁', 'tough'],
            [3, '😐', 'okay'],
            [4, '🙂', 'good'],
            [5, '😊', 'great']
          ].map(([n, e, l]) => `
            <button type="button" class="feeling-btn ${Number(r.feeling) === n ? 'selected' : ''}" data-feeling="${n}">
              <span>${e}</span><span class="lbl">${l}</span>
            </button>
          `).join('')}
        </div>
      </div>
      <div class="field">
        <span class="lbl">Symptoms during the session</span>
        ${renderToggleRow('dizzyDuring', 'Dizzy or lightheaded', asBool(r.dizzyDuring))}
        ${renderToggleRow('swellingDuring', 'Swelling came on / got worse', asBool(r.swellingDuring))}
        ${renderToggleRow('breathingDuring', 'Hard to catch breath', asBool(r.breathingDuring))}
        <label class="field" style="margin-top:8px;">
          <span class="small">Note about symptoms (optional)</span>
          <textarea id="f-sym-note" rows="2">${escapeHtml(r.symptomNoteDuring || '')}</textarea>
        </label>
      </div>
      ` : ''}

      <label class="field">
        <span class="lbl">Note (optional)</span>
        <textarea id="f-note" rows="2">${escapeHtml(r.note || '')}</textarea>
      </label>
    `;
    document.querySelectorAll('#f-borg-grid .borg-row').forEach(el => {
      el.addEventListener('click', () => {
        document.querySelectorAll('#f-borg-grid .borg-row').forEach(x => x.classList.remove('selected'));
        el.classList.add('selected');
      });
    });
    document.querySelectorAll('#f-feeling-row .feeling-btn').forEach(el => {
      el.addEventListener('click', () => {
        document.querySelectorAll('#f-feeling-row .feeling-btn').forEach(x => x.classList.remove('selected'));
        el.classList.add('selected');
      });
    });
    const total = document.getElementById('f-total');
    const rounds = document.getElementById('f-rounds');
    const mpr = document.getElementById('f-mpr');
    if (total && rounds && mpr) {
      const recompute = (src) => {
        const t = safeNum(total.value), rv = safeNum(rounds.value), m = safeNum(mpr.value);
        if (src === 'total' && rv && !m) mpr.value = Math.round(t / rv);
        else if (src === 'mpr' && rv && !t) total.value = Math.round(m * rv);
        else if (src === 'rounds' && t && !m) mpr.value = Math.round(t / rv);
      };
      total.addEventListener('change', () => recompute('total'));
      mpr.addEventListener('change', () => recompute('mpr'));
      rounds.addEventListener('change', () => recompute('rounds'));
    }
  };

  document.querySelectorAll('#f-cat-chips .chip').forEach(el => {
    el.addEventListener('click', () => {
      currentCat = el.dataset.cat;
      currentSubs = [];
      document.querySelectorAll('#f-cat-chips .chip').forEach(x => x.classList.remove('selected'));
      el.classList.add('selected');
      renderSubtypeAndBouts();
    });
  });
  renderSubtypeAndBouts();

  window.__activeFormCat = () => currentCat;
  window.__activeFormSubs = () => currentSubs.slice();
}

function saveActivityForm(existingId) {
  const cat = window.__activeFormCat();
  const subs = window.__activeFormSubs();
  const catDef = ACTIVITY_CATEGORIES[cat];
  const isRest = cat === 'rest';
  const total = isRest ? 0 : (safeNum((document.getElementById('f-total')||{}).value, 0) || 0);
  const rounds = isRest ? 0 : (safeNum((document.getElementById('f-rounds')||{}).value, 1) || 1);
  const mpr = isRest ? 0 : (safeNum((document.getElementById('f-mpr')||{}).value, total) || total);
  const borgEl = document.querySelector('#f-borg-grid .borg-row.selected');
  const feelingEl = document.querySelector('#f-feeling-row .feeling-btn.selected');
  const record = {
    id: existingId || undefined,
    date: document.getElementById('f-date').value,
    category: cat,
    subtypes: subs,
    totalMinutes: total,
    rounds: rounds,
    minutesPerRound: mpr,
    restBetweenMin: isRest ? null : safeNum((document.getElementById('f-rest')||{}).value),
    borg: borgEl ? Number(borgEl.dataset.borg) : null,
    talkTestOK: catDef.programmed ? toggleVal('talkTestOK') : null,
    recoveryHR: catDef.programmed ? (() => {
      const raw = ((document.getElementById('f-recovery-hr')||{}).value || '').trim();
      if (raw === '') return null;
      const n = Number(raw);
      return Number.isFinite(n) && n > 0 ? n : null;
    })() : null,
    feeling: feelingEl ? Number(feelingEl.dataset.feeling) : null,
    dizzyDuring: catDef.programmed ? toggleVal('dizzyDuring') : false,
    swellingDuring: catDef.programmed ? toggleVal('swellingDuring') : false,
    breathingDuring: catDef.programmed ? toggleVal('breathingDuring') : false,
    symptomNoteDuring: catDef.programmed ? ((document.getElementById('f-sym-note')||{}).value || '').trim() : '',
    note: ((document.getElementById('f-note')||{}).value || '').trim(),
    isProgrammed: catDef.programmed
  };
  if (isRest) {
    const list = state.config.restDays || [];
    if (!list.includes(record.date)) setConfig({ restDays: [...list, record.date] });
  }
  upsertEntry('activity', record);
  closeModal();
  flushSync();
  renderActiveView();
}

/* ─── 6b. Day detail modal ──────────────────────────────────────── */

function openDayDetail(iso) {
  const e = entriesOnDay(iso);
  const isRest = (state.config.restDays || []).includes(iso);
  const allItems = [];
  e.vitals.forEach(r => allItems.push({ type: 'vitals', record: r }));
  e.activity.forEach(r => allItems.push({ type: 'activity', record: r }));
  e.ekg.forEach(r => allItems.push({ type: 'ekg', record: r }));
  e.bloodSugar.forEach(r => allItems.push({ type: 'bloodSugar', record: r }));
  e.symptoms.forEach(r => allItems.push({ type: 'symptoms', record: r }));

  const html = `
    <div class="modal-head">
      <h2>${escapeHtml(fmtDayHeading(iso))}</h2>
      <button class="icon-btn" onclick="closeModal()" aria-label="Close">✕</button>
    </div>
    <div class="modal-body">
      ${isRest ? `
        <div class="card soft" style="display:flex; align-items:center; justify-content:space-between; gap:10px;">
          <span>Marked as a rest day.</span>
          <button class="ghost" onclick="unmarkRestDay('${iso}'); closeModal(); openDayDetail('${iso}')">Undo</button>
        </div>
      ` : (allItems.length === 0 ? `
        <div class="card soft small italic">Nothing logged for this day.</div>
      ` : '')}

      ${allItems.length > 0 ? `
        <div style="margin-top: 8px;">
          ${allItems.map(it => {
            const meta = entryMeta(it.type, it.record);
            return `
              <div class="entry-row">
                <div class="entry-icon">${entryIcon(it.type, it.record)}</div>
                <div class="entry-body">
                  <div class="entry-title">${escapeHtml(meta.title)}</div>
                  <div class="entry-meta">${escapeHtml(meta.subtitle)}</div>
                </div>
                <button class="btn ghost" onclick='editEntry(${JSON.stringify(it.type)}, ${JSON.stringify(it.record.id)})'>Edit</button>
              </div>
            `;
          }).join('')}
        </div>
      ` : ''}

      <h4>Add a new entry on this day</h4>
      <div class="btn-grid-2">
        <button class="btn" onclick="addOnDay('${iso}','vitals')">+ Vitals</button>
        <button class="btn" onclick="addOnDay('${iso}','activity')">+ Activity</button>
        <button class="btn" onclick="addOnDay('${iso}','symptoms')">+ Symptoms</button>
        <button class="btn" onclick="addOnDay('${iso}','ekg')">+ EKG</button>
        <button class="btn" onclick="addOnDay('${iso}','bloodSugar')">+ Blood sugar</button>
      </div>

      ${!isRest && e.activity.length === 0 ? `
        <button class="btn" style="width:100%; margin-top:12px;" onclick="markRestDay('${iso}'); closeModal(); openDayDetail('${iso}')">
          Mark this day as a rest day
        </button>
      ` : ''}
    </div>
    <div class="modal-foot">
      <button class="btn primary" onclick="closeModal()">Done</button>
    </div>
  `;
  openModal(html, { full: true });
}

function editEntry(type, id) {
  const record = state[type].find(r => r.id === id);
  if (!record) return;
  closeModal();
  openLog(type, record);
}

function addOnDay(iso, type) {
  closeModal();
  if (type === 'vitals' || type === 'activity') openLog(type, { date: iso });
  else openLog(type, { dateTime: iso + 'T' + (new Date().toTimeString().slice(0,5)) + ':00' });
}

/* ─── 6c. Stage decision modal ──────────────────────────────────── */

function openStageDecision(weekStartIso) {
  const stage = STAGES[state.config.currentStage] || STAGES[0];
  const existing = state.stageDecisions.find(d => d.weekStartDate === weekStartIso);
  const ticked = existing ? (Array.isArray(existing.criteriaTicked) ? existing.criteriaTicked : safeParseArray(existing.criteriaTicked)) : new Array(stage.advance.length).fill(false);
  const html = `
    <div class="modal-head">
      <h2>Stage decision · ${escapeHtml(fmtWeekLabel(weekStartIso))}</h2>
      <button class="icon-btn" onclick="closeModal()" aria-label="Close">✕</button>
    </div>
    <div class="modal-body">
      <div class="card soft">
        <strong>Currently:</strong> Stage ${stage.n} — ${escapeHtml(stage.title)}
      </div>

      <h4>"Ready to advance" criteria for this stage</h4>
      <p class="small">Tick the ones you've actually met this week.</p>
      <div id="f-criteria">
        ${stage.advance.map((c, i) => `
          ${renderToggleRow('cr-' + i, c, ticked[i])}
        `).join('')}
      </div>

      <h4>Your choice</h4>
      <div class="chips" id="f-choice">
        ${[
          ['advance','Advance to next stage'],
          ['hold','Hold (most common)'],
          ['dropBack','Drop back one stage']
        ].map(([k, lbl]) => `
          <button type="button" class="chip ${existing && existing.choice === k ? 'selected' : ''}" data-choice="${k}">${escapeHtml(lbl)}</button>
        `).join('')}
      </div>

      <label class="field" style="margin-top:14px;">
        <span class="lbl">Note (optional — context for the doctor)</span>
        <textarea id="f-note" rows="2">${escapeHtml(existing ? (existing.note || '') : '')}</textarea>
      </label>

      <div class="card soft small italic" style="margin-top:14px;">
        The app records what you chose. It never auto-advances. Confirm progressive exertion with your cardiologist when in doubt.
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn ghost" onclick="closeModal()">Cancel</button>
      <button class="btn primary" onclick="saveStageDecision('${weekStartIso}', '${existing ? existing.id : ''}')">Save decision</button>
    </div>
  `;
  openModal(html, { full: false });
  document.querySelectorAll('#f-choice .chip').forEach(el => {
    el.addEventListener('click', () => {
      document.querySelectorAll('#f-choice .chip').forEach(x => x.classList.remove('selected'));
      el.classList.add('selected');
    });
  });
}

/* ─── Monday prompt — once per ISO week, combines weekly goal + stage decision.
 *    Fires on first open Mon–Sun if not yet shown for that week's Monday,
 *    so missing Monday doesn't skip the whole week. Tracked in
 *    state.config.lastMondayPromptWeek. */

function mondayPromptDue() {
  if (!state.config.firstRunComplete) return false;
  const thisMon = mondayOf(todayISO());
  return (state.config.lastMondayPromptWeek || '') !== thisMon;
}

function dismissMondayPrompt() {
  setConfig({ lastMondayPromptWeek: mondayOf(todayISO()) });
}

function openMondayPrompt() {
  const thisMon = mondayOf(todayISO());
  const stage = STAGES[state.config.currentStage] || STAGES[0];
  const existing = state.stageDecisions.find(d => d.weekStartDate === thisMon);
  const ticked = existing
    ? (Array.isArray(existing.criteriaTicked) ? existing.criteriaTicked : safeParseArray(existing.criteriaTicked))
    : new Array(stage.advance.length).fill(false);

  const html = `
    <div class="modal-head">
      <h2>This week · ${escapeHtml(fmtWeekRange(thisMon))}</h2>
      <button class="icon-btn" onclick="closeMondayPrompt()" aria-label="Close">✕</button>
    </div>
    <div class="modal-body">
      <p class="small" style="margin-top:0;">A quick start-of-week check-in. Both parts are optional — fill what's useful.</p>

      <h4>This week's goal</h4>
      <label class="field">
        <input type="text" id="f-mp-goal" value="${escapeHtml(state.config.weeklyGoal || '')}" placeholder="e.g., 3 pool days · 1 strength day" />
        <span class="help">Shown on the Today screen.</span>
      </label>

      <h4 style="margin-top:18px;">Stage decision</h4>
      <div class="card soft" style="margin-bottom:10px;">
        <strong>Currently:</strong> Stage ${stage.n} — ${escapeHtml(stage.title)}
      </div>
      <p class="small">Tick the "ready to advance" criteria you've actually met this week.</p>
      <div id="f-criteria">
        ${stage.advance.map((c, i) => renderToggleRow('cr-' + i, c, ticked[i])).join('')}
      </div>

      <p class="small" style="margin-top:14px;">Your choice (pick one if you're recording a decision this week):</p>
      <div class="chips" id="f-choice">
        ${[
          ['advance','Advance to next stage'],
          ['hold','Hold (most common)'],
          ['dropBack','Drop back one stage']
        ].map(([k, lbl]) => `
          <button type="button" class="chip ${existing && existing.choice === k ? 'selected' : ''}" data-choice="${k}">${escapeHtml(lbl)}</button>
        `).join('')}
      </div>

      <label class="field" style="margin-top:14px;">
        <span class="lbl">Note (optional — context for the doctor)</span>
        <textarea id="f-note" rows="2">${escapeHtml(existing ? (existing.note || '') : '')}</textarea>
      </label>

      <div class="card soft small italic" style="margin-top:14px;">
        The app records what you choose. It never auto-advances or suggests a choice.
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn ghost" onclick="closeMondayPrompt()">Skip for now</button>
      <button class="btn primary" onclick="saveMondayPrompt()">Save</button>
    </div>
  `;
  openModal(html, { full: false });
  document.querySelectorAll('#f-choice .chip').forEach(el => {
    el.addEventListener('click', () => {
      document.querySelectorAll('#f-choice .chip').forEach(x => x.classList.remove('selected'));
      el.classList.add('selected');
    });
  });
}

function closeMondayPrompt() {
  dismissMondayPrompt();
  closeModal();
}

function saveMondayPrompt() {
  const thisMon = mondayOf(todayISO());
  const stage = STAGES[state.config.currentStage] || STAGES[0];
  // Goal — always write (empty string clears it intentionally)
  const goal = document.getElementById('f-mp-goal').value.trim();
  setConfig({ weeklyGoal: goal });
  // Stage decision — only write if she picked a choice; otherwise skip it
  const sel = document.querySelector('#f-choice .chip.selected');
  if (sel) {
    const ticked = stage.advance.map((_, i) => toggleVal('cr-' + i));
    const existing = state.stageDecisions.find(d => d.weekStartDate === thisMon);
    upsertEntry('stageDecisions', {
      id: existing ? existing.id : undefined,
      weekStartDate: thisMon,
      stage: state.config.currentStage,
      choice: sel.dataset.choice,
      criteriaTicked: ticked,
      note: document.getElementById('f-note').value.trim()
    });
  }
  dismissMondayPrompt();
  closeModal();
  flushSync();
  renderActiveView();
}

function saveStageDecision(weekStartIso, existingId) {
  const stage = STAGES[state.config.currentStage] || STAGES[0];
  const ticked = stage.advance.map((_, i) => toggleVal('cr-' + i));
  const sel = document.querySelector('#f-choice .chip.selected');
  if (!sel) { alert('Pick advance, hold, or drop back.'); return; }
  const choice = sel.dataset.choice;
  const record = {
    id: existingId || undefined,
    weekStartDate: weekStartIso,
    stage: state.config.currentStage,
    choice,
    criteriaTicked: ticked,
    note: document.getElementById('f-note').value.trim()
  };
  if (!existingId) {
    const ex = state.stageDecisions.find(d => d.weekStartDate === weekStartIso);
    if (ex) record.id = ex.id;
  }
  upsertEntry('stageDecisions', record);
  closeModal();
  flushSync();
  renderActiveView();
}
</script>

<script>
/* ─── 7. First-run wizard ───────────────────────────────────────── */

let firstRunStep = 0;
let firstRunData = { stage: 0, mpr: 5, sheetUrl: '' };

function openFirstRun() {
  firstRunStep = 0;
  firstRunData = { stage: state.config.currentStage || 0, mpr: 5, sheetUrl: state.config.sheetUrl || '' };
  renderFirstRunStep();
}

function renderFirstRunStep() {
  const steps = ['welcome', 'stage', 'starting', 'sync', 'done'];
  const key = steps[firstRunStep];
  let body = '';
  if (key === 'welcome') body = `
    <div class="first-run-step">
      <h2>Welcome.</h2>
      <div class="welcome-block">
        <p style="margin:0 0 8px;">This is your companion for the cardiac-rehab plan. It logs your vitals and activity, charts how things are trending, and keeps the safety guidance one tap away.</p>
        <p style="margin:0;"><strong>Rest days count as keeping up and are part of the plan — whether you planned one or took one because you needed it.</strong></p>
      </div>
      <p class="small">A few short questions and you're set. You can change everything later in Settings.</p>
    </div>
  `;
  if (key === 'stage') body = `
    <div class="first-run-step">
      <h2>Which stage are you on?</h2>
      <p class="small">If you're just starting out and gathering baseline readings, Stage 0 is the right answer.</p>
      <select id="fr-stage">
        ${STAGES.map(s => `<option value="${s.n}" ${firstRunData.stage === s.n ? 'selected' : ''}>Stage ${s.n} — ${escapeHtml(s.title)}</option>`).join('')}
      </select>
    </div>
  `;
  if (key === 'starting') body = `
    <div class="first-run-step">
      <h2>What's a comfortable starting "minutes per round"?</h2>
      <p class="small">Roughly how many minutes can you walk in the pool comfortably before resting? The plan suggests around 3–5 minutes for many deconditioned people — pick whatever's honest.</p>
      <input type="number" id="fr-mpr" min="1" max="60" value="${firstRunData.mpr}" />
      <p class="small">This is just for the suggested-session card and the staircase chart's starting line.</p>
    </div>
  `;
  if (key === 'sync') body = `
    <div class="first-run-step">
      <h2>Google Sheet sync (optional, recommended)</h2>
      <p class="small">If you've already followed SETUP.md, paste the web-app URL here. If not, skip — the app works fully offline and you can paste it later in Settings.</p>
      <input type="url" id="fr-url" placeholder="https://script.google.com/macros/s/.../exec" value="${escapeHtml(firstRunData.sheetUrl)}" />
      <div class="btn-row">
        <button class="btn" onclick="frTestSync()">Test connection</button>
      </div>
      <div id="fr-test-result" class="small"></div>
    </div>
  `;
  if (key === 'done') body = `
    <div class="first-run-step">
      <h2>All set.</h2>
      <p>The bottom bar takes you between Today, the Log, Trends, the Guide, and Safety. The gear (top-right) reopens Settings.</p>
      <p class="small">A nice first step: log this morning's resting heart rate, then today's pool session.</p>
    </div>
  `;

  const html = `
    <div class="modal-head">
      <h2 style="font-size:var(--fs-lg);">Setup — ${firstRunStep + 1} / ${steps.length}</h2>
    </div>
    <div class="modal-body">${body}</div>
    <div class="modal-foot">
      ${firstRunStep > 0 ? `<button class="btn ghost" onclick="frBack()">Back</button>` : ''}
      <button class="btn primary" onclick="frNext()">${firstRunStep === steps.length - 1 ? 'Done' : 'Continue'}</button>
    </div>
  `;
  openModal(html, { full: true });
}

function frBack() {
  collectFirstRunStep();
  if (firstRunStep > 0) firstRunStep--;
  renderFirstRunStep();
}
function frNext() {
  const steps = ['welcome', 'stage', 'starting', 'sync', 'done'];
  collectFirstRunStep();
  if (firstRunStep < steps.length - 1) {
    firstRunStep++;
    renderFirstRunStep();
  } else {
    setConfig({
      currentStage: firstRunData.stage,
      sheetUrl: firstRunData.sheetUrl,
      firstRunComplete: true
    });
    closeModal();
    if (firstRunData.sheetUrl) {
      pullFromSheet().then(() => { renderActiveView(); });
    } else {
      renderActiveView();
    }
  }
}
function collectFirstRunStep() {
  const stageEl = document.getElementById('fr-stage');
  if (stageEl) firstRunData.stage = Number(stageEl.value);
  const mprEl = document.getElementById('fr-mpr');
  if (mprEl) firstRunData.mpr = safeNum(mprEl.value, 5);
  const urlEl = document.getElementById('fr-url');
  if (urlEl) firstRunData.sheetUrl = urlEl.value.trim();
}
async function frTestSync() {
  const url = document.getElementById('fr-url').value.trim();
  const out = document.getElementById('fr-test-result');
  if (!url) { out.textContent = 'Paste a URL first.'; return; }
  out.textContent = 'Testing…';
  try {
    const res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action: 'ping' })
    });
    const data = await res.json();
    if (data.ok && data.pong) out.innerHTML = '<span style="color:var(--success)">✓ Connected.</span>';
    else out.innerHTML = '<span style="color:var(--signal-ink)">Unexpected response: ' + escapeHtml(JSON.stringify(data)) + '</span>';
  } catch (e) {
    out.innerHTML = '<span style="color:var(--signal-ink)">Could not reach: ' + escapeHtml(e.message) + '</span>';
  }
}
</script>

<script>
/* ─── 8. Router + tab nav ───────────────────────────────────────── */

let activeView = 'today';

function switchView(name) {
  activeView = name;
  document.querySelectorAll('.view').forEach(el => el.classList.toggle('active', el.id === 'view-' + name));
  document.querySelectorAll('#bottom-tabs button').forEach(el => el.classList.toggle('active', el.dataset.view === name));
  const titles = { today: 'Today', log: 'Log', trends: 'Trends', guide: 'Guide', safety: 'When to stop', settings: 'Settings', print: 'Weekly summary' };
  document.getElementById('top-title').textContent = titles[name] || '';
  renderActiveView();
  window.scrollTo({ top: 0 });
}

function renderActiveView() {
  if (activeView === 'today')    renderToday();
  if (activeView === 'log')      renderLog();
  if (activeView === 'trends')   renderTrends();
  if (activeView === 'guide')    renderGuide();
  if (activeView === 'safety')   renderSafety();
  if (activeView === 'settings') renderSettings();
}

/* ─── 9. Init ───────────────────────────────────────────────────── */

function init() {
  // Test-mode short-circuit: tests.html loads this file in a hidden iframe
  // with `?test=1` so it can call the helper functions against fixture data
  // without rendering, registering the SW, or showing first-run/Monday modals.
  if (/[?&]test=1\b/.test(location.search) || window.__forceTestMode) {
    // Top-level `const` bindings aren't on window in a classic script —
    // re-export the ones tests need so the parent page can read them.
    window.DEFAULT_CONFIG = DEFAULT_CONFIG;
    window.STAGES = STAGES;
    window.PLAN_THRESHOLDS = PLAN_THRESHOLDS;
    window.__cgTestReady = true;
    return;
  }
  loadState();
  applyAppearance();

  // If a prior version registered a service worker, unregister it so this
  // build stops serving cached files. Browsers keep the SW around forever
  // otherwise, which would silently mask app updates.
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations().then(regs => regs.forEach(r => r.unregister())).catch(() => {});
  }

  document.querySelectorAll('#bottom-tabs button').forEach(b => {
    b.addEventListener('click', () => switchView(b.dataset.view));
  });
  document.getElementById('open-settings').addEventListener('click', () => switchView('settings'));
  document.getElementById('quick-log').addEventListener('click', openQuickLogPicker);

  window.addEventListener('scroll', () => {
    const tb = document.getElementById('top-bar');
    tb.classList.toggle('scrolled', window.scrollY > 4);
  });

  updateSyncIndicator(state.config.sheetUrl ? 'syncing' : 'offline');
  if (state.config.sheetUrl) {
    flushSync();
    pullFromSheet().then(() => renderActiveView());
  }
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible' && state.config.sheetUrl) flushSync();
  });

  if (!state.config.firstRunComplete) {
    openFirstRun();
  } else if (mondayPromptDue()) {
    // Defer so the Today view paints first; the modal then sits on top
    setTimeout(openMondayPrompt, 0);
  }

  renderActiveView();
}

document.addEventListener('DOMContentLoaded', init);
</script>

</body>
