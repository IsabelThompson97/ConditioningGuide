<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Conditioning Guide</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#5e8a8e" />

<!-- iOS "Add to Home Screen" support -->
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Conditioning" />
<meta name="mobile-web-app-capable" content="yes" />
<link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='38' fill='%235e8a8e'/><path d='M90 50c-22 0-40 18-40 40s18 40 40 40 40-18 40-40-18-40-40-40zm0 12a28 28 0 110 56 28 28 0 010-56zm-6 18v18h18v6h-24v-24z' fill='white'/></svg>" />
<link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%235e8a8e'/><circle cx='16' cy='16' r='7' fill='none' stroke='white' stroke-width='2'/><path d='M16 12v5h4' stroke='white' stroke-width='2' fill='none' stroke-linecap='round'/></svg>" />

<!-- Charts: CDN with graceful fallback (charts vanish, app still works) -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.js"
        onerror="window.__chartCdnFailed=true"></script>
<style>
/* =============================================================
   Conditioning Guide — calm health companion
   Mobile-first. Bottom-tab nav. Big tap targets for poolside use.
   Palette: warm paper, soft slate ink, muted spa-teal accent.
   No reds, no fire emojis. Reminders are amber and gentle.
   ============================================================= */
:root {
  /* Default theme — off-white with a hint of warmth.
     Between warm-paper and soft-white. */
  --bg: #f3f1ec;
  --panel: #faf8f3;
  --panel-2: #eae7df;
  --panel-3: #ddd9cd;
  --ink: #26292f;
  --ink-2: #4d525a;
  --muted: #888d93;
  --line: #e0ddd2;
  --line-2: #c8c3b6;

  --accent: #5e8a8e;
  --accent-soft: #e1ecec;
  --accent-deep: #3d6669;

  --c-programmed: #5e8a8e;
  --c-light:      #b6c3b1;
  --c-rest:       #d2b48a;
  --c-empty:      #d8d3c5;

  --signal: #c9883a;
  --signal-bg: #f5ecd9;
  --signal-ink: #7a572a;
  --success: #6a8a5e;

  --shadow: 0 1px 2px rgba(38,41,47,.05), 0 6px 20px rgba(38,41,47,.06);
  --shadow-pop: 0 2px 6px rgba(38,41,47,.08), 0 16px 40px rgba(38,41,47,.10);

  --radius: 14px;
  --radius-sm: 8px;
  --radius-lg: 22px;

  /* Font families — jobmap design language */
  --font-sans: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", system-ui, sans-serif;
  --font-serif: "Iowan Old Style", "Palatino", "Georgia", serif;
  --font-mono: ui-monospace, "SF Mono", "Menlo", "Consolas", monospace;

  /* Type scale — every UI element picks from this set.
     Display: serif. Body: sans. Eyebrow/caption: mono caps. */
  --fs-display-lg: 28px;   /* view title          (serif) */
  --fs-display:    22px;   /* h3 / modal heading  (serif) */
  --fs-title:      15px;   /* card title          (sans 500) */
  --fs-body:       15px;   /* paragraphs / inputs / toggle labels */
  --fs-body-sm:    13px;   /* secondary / helpers */
  --fs-eyebrow:    11px;   /* form-field labels, section captions (mono caps) */
  --fs-caption:    10px;   /* chips, smallest meta (mono caps) */

  --ls-display: -0.01em;
  --ls-eyebrow: 0.1em;
  --ls-caption: 0.08em;

  /* Consistent vertical rhythm */
  --gap-field: 18px;   /* between form fields */
  --gap-row:   10px;   /* between toggle rows / chips */

  --tap: 48px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);

  /* Backward-compat aliases for the old name set.
     New code should use --fs-display-lg / --fs-display / --fs-title /
     --fs-body / --fs-body-sm / --fs-eyebrow / --fs-caption directly. */
  --fs:    var(--fs-body);
  --fs-sm: var(--fs-body-sm);
  --fs-lg: 17px;
  --fs-xl: var(--fs-display);
}

/* Theme: Warm paper — original, slightly more saturated than default */
html.theme-warm {
  --bg: #f6f3ec;
  --panel: #fbfaf6;
  --panel-2: #efece2;
  --panel-3: #e6e1d3;
  --ink: #2c3138;
  --ink-2: #5a6068;
  --muted: #8a8f96;
  --line: #e6e1d3;
  --line-2: #cfc8b6;
  --accent: #5e8a8e;
  --accent-soft: #e6efef;
  --accent-deep: #3d6669;
  --c-programmed: #5e8a8e;
  --c-light: #b9c8b3;
  --c-rest: #d2b48a;
  --c-empty: #e2dccb;
  --signal: #c9883a;
  --signal-bg: #faf2e6;
  --signal-ink: #7e5a2c;
  --success: #6a8a5e;
}

/* Theme: Soft white — cool neutrals */
html.theme-soft {
  --bg: #f5f5f7;
  --panel: #ffffff;
  --panel-2: #eeeef2;
  --panel-3: #e2e2e8;
  --ink: #1f2330;
  --ink-2: #4a4f5d;
  --muted: #7a808c;
  --line: #e6e6ec;
  --line-2: #d0d0d8;
  --accent: #4e7d8e;
  --accent-soft: #e3eef2;
  --accent-deep: #2d5a6b;
  --c-programmed: #4e7d8e;
  --c-light: #b3c2bd;
  --c-rest: #c9aa7e;
  --c-empty: #d8d8df;
  --signal: #c9883a;
  --signal-bg: #f7eed7;
  --signal-ink: #7a572a;
  --success: #6a8a6e;
}

/* Theme: High contrast — for low-vision use */
html.theme-contrast {
  --bg: #ffffff;
  --panel: #ffffff;
  --panel-2: #f1f1f1;
  --panel-3: #dedede;
  --ink: #111111;
  --ink-2: #2b2b2b;
  --muted: #555555;
  --line: #c8c8c8;
  --line-2: #8d8d8d;
  --accent: #1f5a63;
  --accent-soft: #c4dde0;
  --accent-deep: #0d3a44;
  --c-programmed: #1f5a63;
  --c-light: #6b8a8e;
  --c-rest: #a87340;
  --c-empty: #b8b8b8;
  --signal: #8a4e0e;
  --signal-bg: #f5e2c4;
  --signal-ink: #5a3208;
  --success: #2f5e22;
}

/* Theme: Dark mode — warm dark with cream ink */
html.theme-dark {
  --bg: #1d1f23;
  --panel: #25282d;
  --panel-2: #2f3338;
  --panel-3: #3a3e44;
  --ink: #ece8df;
  --ink-2: #b5b1a8;
  --muted: #8a867e;
  --line: #3a3e44;
  --line-2: #4d5158;
  --accent: #88b3b8;
  --accent-soft: #2c3a3b;
  --accent-deep: #b0d0d4;
  --c-programmed: #88b3b8;
  --c-light: #9bb29a;
  --c-rest: #c4a276;
  --c-empty: #3a3e44;
  --signal: #d0a368;
  --signal-bg: #3a3329;
  --signal-ink: #e8c997;
  --success: #9ab685;
  --shadow: 0 1px 2px rgba(0,0,0,.3), 0 6px 20px rgba(0,0,0,.25);
  --shadow-pop: 0 2px 6px rgba(0,0,0,.35), 0 16px 40px rgba(0,0,0,.4);
}

html.text-large {
  --fs-body: 17px; --fs-body-sm: 15px; --fs-title: 17px;
  --fs-display: 24px; --fs-display-lg: 30px;
  --fs-eyebrow: 12px; --fs-caption: 11px;
}
html.text-xlarge {
  --fs-body: 19px; --fs-body-sm: 16px; --fs-title: 19px;
  --fs-display: 26px; --fs-display-lg: 34px;
  --fs-eyebrow: 13px; --fs-caption: 12px;
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body {
  margin: 0; padding: 0; height: 100%;
  font-family: var(--font-sans);
  font-size: var(--fs);
  color: var(--ink); background: var(--bg);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  line-height: 1.45;
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.001ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.001ms !important;
    scroll-behavior: auto !important;
  }
}

/* ---------- App shell ---------- */
#app-shell {
  display: flex; flex-direction: column;
  min-height: 100dvh;
  max-width: 720px;
  margin: 0 auto;
  position: relative;
}

#top-bar {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 18px 10px;
  position: sticky; top: 0; z-index: 30;
  background: var(--bg);
  border-bottom: 1px solid transparent;
}
#top-bar.scrolled { border-bottom-color: var(--line); }
#top-bar h1 {
  margin: 0;
  font-family: var(--font-serif);
  font-size: var(--fs-lg);
  font-weight: 500;
  letter-spacing: -0.01em;
  flex: 1;
  color: var(--ink);
}
#top-bar .icon-btn {
  background: transparent; border: none; cursor: pointer;
  padding: 8px; margin: -8px;
  color: var(--ink-2);
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%;
  min-width: var(--tap); min-height: var(--tap);
}
#top-bar .icon-btn:hover { color: var(--ink); background: var(--panel-2); }
#sync-dot {
  display: inline-block;
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--muted);
  margin-right: 4px;
  flex-shrink: 0;
}
#sync-dot.synced { background: var(--success); }
#sync-dot.syncing { background: var(--signal); animation: pulse 1.2s ease-in-out infinite; }
#sync-dot.offline { background: var(--muted); }
#sync-dot.error { background: var(--signal); }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

#sync-status {
  font-family: var(--font-mono);
  font-size: var(--fs-caption);
  text-transform: uppercase;
  letter-spacing: var(--ls-caption);
  color: var(--muted);
  display: flex; align-items: center; gap: 6px;
  cursor: default;
}
#sync-status #sync-text { line-height: 1; }

/* ---------- Main views ---------- */
main {
  flex: 1;
  padding: 8px 16px calc(80px + var(--safe-bottom));
  overflow-x: hidden;
}
.view { display: none; }
.view.active { display: block; animation: fadeIn 0.18s ease-out; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

h2.view-title {
  font-family: var(--font-serif);
  font-size: var(--fs-display-lg);
  font-weight: 500;
  margin: 10px 0 22px;
  letter-spacing: var(--ls-display);
  line-height: 1.1;
}
h3 {
  font-family: var(--font-serif);
  font-size: var(--fs-display);
  font-weight: 500;
  margin: 28px 0 12px;
  letter-spacing: var(--ls-display);
  line-height: 1.15;
}
h4 {
  font-family: var(--font-sans);
  font-size: var(--fs-title);
  font-weight: 600;
  margin: 18px 0 8px;
  color: var(--ink);
  line-height: 1.25;
}
p { margin: 0 0 12px; color: var(--ink-2); font-size: var(--fs-body); }
small, .small { font-size: var(--fs-body-sm); color: var(--muted); }

/* Eyebrow / caption utility classes — jobmap pattern */
.eyebrow {
  font-family: var(--font-mono);
  font-size: var(--fs-eyebrow);
  text-transform: uppercase;
  letter-spacing: var(--ls-eyebrow);
  color: var(--muted);
  font-weight: 500;
}
.caption {
  font-family: var(--font-mono);
  font-size: var(--fs-caption);
  text-transform: uppercase;
  letter-spacing: var(--ls-caption);
  color: var(--muted);
  font-weight: 400;
}

/* ---------- Cards ---------- */
.card {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 18px;
  margin-bottom: 16px;
  box-shadow: var(--shadow);
}
.card.soft { background: var(--panel-2); box-shadow: none; }
.card-title {
  font-family: var(--font-mono);
  font-size: var(--fs-eyebrow);
  text-transform: uppercase;
  letter-spacing: var(--ls-eyebrow);
  color: var(--muted);
  margin: 0 0 10px;
  font-weight: 500;
}

/* ---------- Buttons ---------- */
button, .btn {
  font-family: inherit; font-size: var(--fs); cursor: pointer;
  border: 1px solid var(--line-2);
  background: var(--panel);
  color: var(--ink);
  border-radius: var(--radius-sm);
  padding: 12px 16px;
  min-height: var(--tap);
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  transition: background 0.12s, border-color 0.12s, transform 0.05s;
}
button:active, .btn:active { transform: scale(0.98); }
button:hover, .btn:hover { background: var(--panel-2); }
button.primary, .btn.primary {
  background: var(--accent); color: white; border-color: var(--accent);
  font-weight: 500;
}
button.primary:hover { background: var(--accent-deep); }
button.ghost { background: transparent; border-color: transparent; color: var(--ink-2); }
button.ghost:hover { color: var(--ink); background: var(--panel-2); }
button.danger {
  color: var(--signal-ink); border-color: var(--signal);
  background: var(--signal-bg);
}
button.big, .btn.big {
  font-size: var(--fs-lg);
  padding: 18px 16px;
  min-height: 64px;
  border-radius: var(--radius);
  font-weight: 500;
  /* Sheer accent on hover/focus/active — same color shift for every big
     button so none feels "primary" while the others sit secondary. */
  transition: background 0.15s, border-color 0.15s, color 0.15s;
}
button.big:hover, .btn.big:hover,
button.big:focus-visible, .btn.big:focus-visible,
button.big:active, .btn.big:active {
  background: var(--accent-soft);
  border-color: var(--accent);
  color: var(--accent-deep);
  outline: none;
}

.btn-row { display: flex; gap: 10px; flex-wrap: wrap; }
.btn-row.right { justify-content: flex-end; }
.btn-grid-2 {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

/* ---------- Settings sticky header (back + save reachable without scrolling) ---------- */
.settings-bar {
  position: sticky;
  top: 0;
  z-index: 5;
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--bg);
  padding: 10px 0 14px;
  margin: -4px 0 18px;
  border-bottom: 1px solid var(--line);
}
.settings-bar .icon-btn {
  background: transparent; border: none; cursor: pointer;
  padding: 8px; margin-left: -8px;
  color: var(--ink-2);
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%;
  min-width: var(--tap); min-height: var(--tap);
  transition: color 0.12s, background 0.12s;
}
.settings-bar .icon-btn:hover {
  color: var(--accent);
  background: var(--accent-soft);
}
.settings-bar .settings-title {
  flex: 1;
  margin: 0;
  font-family: var(--font-serif);
  font-size: var(--fs-display);
  font-weight: 500;
  letter-spacing: var(--ls-display);
  line-height: 1.1;
}
.settings-bar .settings-save {
  flex-shrink: 0;
  padding: 10px 18px;
  min-height: 40px;
  font-size: var(--fs-body-sm);
}

/* ---------- Bottom tab nav ---------- */
#bottom-tabs {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--panel);
  border-top: 1px solid var(--line);
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  padding-bottom: var(--safe-bottom);
  z-index: 40;
  max-width: 720px;
  margin: 0 auto;
}
#bottom-tabs button {
  border: none; background: transparent;
  padding: 8px 4px 6px;
  display: flex; flex-direction: column;
  align-items: center; gap: 2px;
  color: var(--muted);
  font-size: 11px;
  font-weight: 500;
  min-height: var(--tap);
  border-radius: 0;
  position: relative;
  transition: color 0.18s, background 0.18s;
}
#bottom-tabs button svg { width: 22px; height: 22px; transition: transform 0.18s; }
/* Hover/focus — soft accent tint, gentle lift on the icon */
#bottom-tabs button:hover,
#bottom-tabs button:focus-visible {
  color: var(--accent);
  background: var(--accent-soft);
  outline: none;
}
#bottom-tabs button:hover svg,
#bottom-tabs button:focus-visible svg { transform: translateY(-1px); }
#bottom-tabs button.active { color: var(--accent); }
/* Active gets a subtle accent bar at the top of the tab */
#bottom-tabs button.active::before {
  content: '';
  position: absolute;
  top: 0; left: 18%; right: 18%;
  height: 2px;
  background: var(--accent);
  border-radius: 0 0 2px 2px;
}
/* Safety: same neutral muted as the others when unselected; amber accent
   only when it's the active tab (so the safety state still reads as
   distinct without darkening the row at rest). */
#bottom-tabs button.active.safety { color: var(--signal); }
#bottom-tabs button.active.safety::before { background: var(--signal); }
#bottom-tabs button.safety:hover,
#bottom-tabs button.safety:focus-visible {
  color: var(--signal);
  background: var(--signal-bg);
}

/* ---------- Day strip ---------- */
.day-strip {
  display: flex; gap: 6px;
  overflow-x: auto;
  padding: 6px 0 14px;
  scrollbar-width: none;
  scroll-snap-type: x proximity;
}
.day-strip::-webkit-scrollbar { display: none; }
.day-chip {
  flex: 0 0 44px;
  display: flex; flex-direction: column;
  align-items: center;
  padding: 6px 4px;
  border-radius: 10px;
  cursor: pointer;
  scroll-snap-align: end;
  background: transparent;
  border: 1px solid transparent;
  font-family: inherit;
  color: var(--ink-2);
}
.day-chip:active { transform: scale(0.95); }
.day-chip.today { border-color: var(--accent); }
.day-chip .dow { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); }
.day-chip .num { font-weight: 600; font-size: var(--fs); margin: 2px 0; }
.day-chip .dot {
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--c-empty);
  border: 1px solid transparent;
}
.day-chip[data-state="programmed"] .dot { background: var(--c-programmed); }
.day-chip[data-state="light"] .dot { background: var(--c-light); }
.day-chip[data-state="rest"] .dot { background: var(--c-rest); }
.day-chip[data-state="empty"] .dot { background: transparent; border-color: var(--line-2); }

.legend {
  display: flex; gap: 14px; flex-wrap: wrap;
  font-size: var(--fs-sm);
  color: var(--muted);
  margin-top: 4px;
}
.legend .swatch {
  display: inline-block; width: 9px; height: 9px;
  border-radius: 50%; margin-right: 5px; vertical-align: middle;
}

/* ---------- Calendar heatmap (Trends → Calendar tab) ---------- */
.cal-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 10px;
}
.cal-head .cal-title { font-family: var(--font-serif); font-size: var(--fs-display); }
.cal-head button.cal-nav {
  border: 1px solid var(--line);
  background: var(--panel);
  border-radius: 8px;
  width: 36px; height: 36px;
  cursor: pointer;
  color: var(--ink-2);
  font-family: inherit;
}
.cal-head button.cal-nav:hover { background: var(--panel-2); }
.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 6px;
}
.cal-dow {
  text-align: center;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--muted);
  padding-bottom: 4px;
}
.cal-cell {
  aspect-ratio: 1;
  border-radius: 8px;
  border: 1px solid var(--line);
  background: var(--panel);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  cursor: pointer;
  font-family: inherit;
  color: var(--ink-2);
  padding: 4px;
  position: relative;
  transition: transform 0.08s ease;
}
.cal-cell:active { transform: scale(0.96); }
.cal-cell.other-month { opacity: 0.32; cursor: default; }
.cal-cell.today { border-color: var(--accent); border-width: 2px; }
.cal-cell .cal-num { font-size: var(--fs-body-sm); font-weight: 500; }
.cal-cell .cal-mins {
  font-size: 10px; color: var(--muted);
  font-family: var(--font-mono);
  margin-top: 2px;
}
.cal-cell[data-state="programmed"] { background: color-mix(in srgb, var(--c-programmed) 28%, var(--panel)); }
.cal-cell[data-state="light"]      { background: color-mix(in srgb, var(--c-light) 32%, var(--panel)); }
.cal-cell[data-state="rest"]       { background: color-mix(in srgb, var(--c-rest) 28%, var(--panel)); }
.cal-cell[data-state="empty"]      { background: var(--panel); }

/* ---------- Streak card ---------- */
.streak-card {
  background: linear-gradient(135deg, var(--accent-soft), var(--panel));
  border-color: var(--accent-soft);
}
.streak-card .number {
  font-family: var(--font-serif);
  font-size: 36px;
  font-weight: 500;
  color: var(--accent-deep);
  line-height: 1;
}
.streak-card .label {
  font-size: var(--fs-sm); color: var(--ink-2);
  margin-top: 4px;
}

/* ---------- Form inputs ---------- */
/* Every form field — input group, chip group, toggle group — uses the
   same outer rhythm: 18px margin between groups, eyebrow-style label
   above the content, 8px gap between label and content. */
label.field, .field {
  display: block;
  margin-bottom: var(--gap-field);
}
label.field > .lbl,
.field > .lbl {
  display: block;
  font-family: var(--font-mono);
  font-size: var(--fs-eyebrow);
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: var(--ls-eyebrow);
  color: var(--muted);
  margin-bottom: 10px;
}
label.field > .help,
.field > .help {
  display: block;
  font-size: var(--fs-body-sm);
  color: var(--muted);
  margin-top: 6px;
  line-height: 1.4;
}
input[type="text"], input[type="number"], input[type="date"],
input[type="datetime-local"], input[type="time"], input[type="url"],
select, textarea {
  font-family: var(--font-sans);
  font-size: var(--fs-body);
  width: 100%;
  padding: 12px 14px;
  border: 1px solid var(--line-2);
  border-radius: var(--radius-sm);
  background: var(--panel);
  color: var(--ink);
  min-height: var(--tap);
}
textarea { min-height: 80px; resize: vertical; }
input:focus, select:focus, textarea:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft);
}

/* Toggle pill switch — sits inside a .field group, evenly spaced */
.toggle {
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px;
  padding: 12px 0;
  cursor: pointer;
  min-height: var(--tap);
  border-top: 1px solid var(--line);
}
.field > .toggle:first-of-type,
.toggle:first-child,
.field > .lbl + .toggle {
  border-top: none;
}
.toggle .lbl {
  flex: 1;
  font-family: var(--font-sans);
  font-size: var(--fs-body);
  color: var(--ink);
  font-weight: 400;
  text-transform: none;
  letter-spacing: normal;
  margin: 0;
}
.toggle .switch {
  position: relative;
  width: 44px; height: 26px;
  background: var(--panel-3);
  border-radius: 13px;
  transition: background 0.18s;
  flex-shrink: 0;
}
.toggle .switch::after {
  content: '';
  position: absolute;
  top: 3px; left: 3px;
  width: 20px; height: 20px;
  border-radius: 50%;
  background: white;
  box-shadow: 0 1px 3px rgba(0,0,0,.25);
  transition: left 0.18s;
}
.toggle input { display: none; }
.toggle input:checked ~ .switch { background: var(--accent); }
.toggle input:checked ~ .switch::after { left: 21px; }

/* Chip selector (single + multi) */
.chips { display: flex; flex-wrap: wrap; gap: 8px; }
.chip {
  padding: 8px 14px;
  border: 1px solid var(--line-2);
  border-radius: 999px;
  background: var(--panel);
  color: var(--ink-2);
  cursor: pointer;
  font-size: var(--fs-sm);
  min-height: 38px;
  display: inline-flex; align-items: center;
  user-select: none;
}
.chip:active { transform: scale(0.96); }
.chip.selected {
  background: var(--accent-soft);
  border-color: var(--accent);
  color: var(--accent-deep);
  font-weight: 500;
}

/* Borg picker */
.borg-grid {
  display: grid;
  grid-template-columns: 60px 1fr;
  gap: 6px;
  align-items: stretch;
}
.borg-row {
  display: contents;
  cursor: pointer;
}
.borg-row .num {
  display: flex; align-items: center; justify-content: center;
  padding: 10px;
  border: 1px solid var(--line);
  border-radius: var(--radius-sm) 0 0 var(--radius-sm);
  font-weight: 600;
  font-size: var(--fs-lg);
  background: var(--panel);
}
.borg-row .desc {
  display: flex; align-items: center;
  padding: 10px 14px;
  border: 1px solid var(--line);
  border-left: none;
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  background: var(--panel);
  color: var(--ink-2);
}
.borg-row.selected .num,
.borg-row.selected .desc {
  background: var(--accent-soft);
  border-color: var(--accent);
  color: var(--accent-deep);
}
.borg-row.too-hard .num { color: var(--signal); background: var(--signal-bg); }
.borg-row.too-hard .desc { color: var(--signal-ink); background: var(--signal-bg); }

/* Feeling 1-5 (faces) */
.feeling-row {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
}
.feeling-btn {
  border: 1px solid var(--line-2);
  background: var(--panel);
  border-radius: var(--radius-sm);
  padding: 14px 4px 8px;
  cursor: pointer;
  font-size: 22px;
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  min-height: 64px;
}
.feeling-btn .lbl { font-size: 10px; color: var(--muted); }
.feeling-btn.selected {
  background: var(--accent-soft);
  border-color: var(--accent);
}

/* ---------- Modals ---------- */
.modal-backdrop {
  position: fixed; inset: 0;
  background: rgba(20, 22, 26, 0.45);
  z-index: 100;
  display: none;
  align-items: flex-end;
  justify-content: center;
}
.modal-backdrop.open { display: flex; animation: fadeIn 0.2s ease-out; }
.modal {
  background: var(--bg);
  width: 100%;
  max-width: 720px;
  max-height: 92dvh;
  border-radius: 20px 20px 0 0;
  display: flex; flex-direction: column;
  box-shadow: var(--shadow-pop);
  animation: slideUp 0.22s ease-out;
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: none; } }
.modal-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 18px 12px;
  border-bottom: 1px solid var(--line);
  background: var(--bg);
  border-radius: 20px 20px 0 0;
  position: sticky; top: 0;
}
.modal-head h2 {
  margin: 0;
  font-family: var(--font-serif);
  font-size: var(--fs-display);
  font-weight: 500;
  letter-spacing: var(--ls-display);
}
.modal-body {
  overflow-y: auto;
  padding: 18px;
  flex: 1;
}
.modal-foot {
  border-top: 1px solid var(--line);
  padding: 12px 18px calc(12px + var(--safe-bottom));
  display: flex; gap: 10px; justify-content: flex-end;
  background: var(--bg);
}

/* Full-screen modal variant (first-run, day detail) */
.modal.full {
  height: 100dvh; max-height: 100dvh;
  border-radius: 0;
}
.modal.full .modal-head { border-radius: 0; }

/* ---------- Suggested session card ---------- */
.session-shape {
  list-style: none;
  padding: 0; margin: 8px 0 0;
}
.session-shape li {
  padding: 8px 0 8px 26px;
  position: relative;
  color: var(--ink-2);
  font-size: var(--fs);
  border-bottom: 1px dashed var(--line);
}
.session-shape li:last-child { border-bottom: none; }
.session-shape li::before {
  content: '';
  position: absolute;
  left: 8px; top: 16px;
  width: 6px; height: 6px;
  background: var(--accent);
  border-radius: 50%;
}

/* ---------- Log list (chronological) ---------- */
.day-group {
  margin-bottom: 22px;
}
.day-group-head {
  display: flex; justify-content: space-between; align-items: baseline;
  font-size: var(--fs-sm);
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 8px;
  padding: 0 4px;
}
.day-group-head .heading {
  font-size: var(--fs-sm);
  font-weight: 600;
  color: var(--ink);
  text-transform: none;
  letter-spacing: 0;
}
.entry-row {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 14px;
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  margin-bottom: 6px;
  cursor: pointer;
}
.entry-row:hover { background: var(--panel-2); }
.entry-icon {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: var(--accent-soft);
  color: var(--accent-deep);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.entry-icon svg { width: 18px; height: 18px; }
.entry-body { flex: 1; min-width: 0; }
.entry-title {
  font-weight: 500;
  font-size: var(--fs);
  color: var(--ink);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.entry-meta {
  font-size: var(--fs-sm);
  color: var(--muted);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.entry-time {
  font-size: var(--fs-sm);
  color: var(--muted);
  flex-shrink: 0;
  font-variant-numeric: tabular-nums;
}

/* Symptom + reminder banners (gentle, amber, never red) */
.banner {
  background: var(--signal-bg);
  color: var(--signal-ink);
  border-left: 3px solid var(--signal);
  padding: 12px 14px;
  border-radius: var(--radius-sm);
  margin: 12px 0;
  font-size: var(--fs-sm);
}
.banner strong { font-weight: 600; }

/* ---------- Stage chart (Guide view) ---------- */
.stage-table {
  display: grid;
  gap: 12px;
}
.stage-card {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 16px;
}
.stage-card.current { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
.stage-card h4 { margin: 0 0 4px; font-size: var(--fs-lg); }
.stage-card .meta {
  font-size: var(--fs-sm); color: var(--muted);
  margin-bottom: 8px;
}
.stage-card ul { margin: 6px 0 0; padding-left: 18px; color: var(--ink-2); }
.stage-card .section-label {
  font-family: var(--font-mono);
  font-size: var(--fs-eyebrow);
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: var(--ls-eyebrow);
  color: var(--muted);
  margin-top: 14px;
  margin-bottom: 2px;
}

/* ---------- References list ---------- */
.ref-list {
  margin: 12px 0 0;
  padding-left: 20px;
  font-size: var(--fs-body-sm);
  color: var(--ink-2);
  line-height: 1.5;
}
.ref-list li {
  margin-bottom: 14px;
  padding-left: 4px;
}
.ref-list li:last-child { margin-bottom: 0; }
.ref-list em { color: var(--ink); }
.ref-list a { word-break: break-all; }

/* ---------- Safety view ---------- */
.safety-block {
  background: var(--panel);
  border-left: 4px solid var(--line-2);
  border-radius: var(--radius-sm);
  padding: 16px 18px;
  margin-bottom: 14px;
}
.safety-block.urgent { border-left-color: var(--signal); }
.safety-block h3 {
  margin: 0 0 8px;
  font-family: var(--font-sans);
  font-size: var(--fs-lg);
  font-weight: 600;
}
.safety-block.urgent h3 { color: var(--signal-ink); }
.safety-block ul { margin: 6px 0; padding-left: 22px; color: var(--ink-2); }
.safety-block li { margin-bottom: 4px; }
.safety-block p { margin: 0 0 6px; color: var(--ink-2); }

/* ---------- Charts ---------- */
.chart-card { padding: 14px 14px 8px; }
.chart-card h4 { margin: 0 0 6px; }
.chart-card .subtitle { font-size: var(--fs-sm); color: var(--muted); margin-bottom: 10px; }
.chart-wrap {
  position: relative;
  width: 100%;
  height: 220px;
}
.chart-empty {
  height: 220px;
  display: flex; align-items: center; justify-content: center;
  color: var(--muted);
  font-size: var(--fs-sm);
  font-style: italic;
}

.range-chips { display: flex; gap: 6px; margin-bottom: 14px; }
.range-chips .chip { padding: 6px 12px; min-height: 32px; font-size: var(--fs-sm); }

/* ---------- Narrative weekly summary card ---------- */
.narrative-card {
  background: linear-gradient(180deg, var(--accent-soft) 0%, var(--panel) 60%);
  border-color: var(--accent-soft);
  padding: 22px 20px 18px;
}
.narrative-eyebrow { display: block; margin-bottom: 14px; }
.narrative-print {
  background: transparent;
  border: 1px solid var(--accent-deep);
  color: var(--accent-deep);
  font-family: var(--font-sans);
  font-size: var(--fs-body-sm);
  font-weight: 500;
  padding: 6px 12px;
  border-radius: 8px;
  cursor: pointer;
  margin-bottom: 6px;
  flex: 0 0 auto;
  white-space: nowrap;
}
.narrative-print:hover {
  background: var(--panel);
}
.narrative-hero {
  display: flex; align-items: baseline; gap: 14px;
  margin-bottom: 18px;
}
.narrative-hero .hero-num {
  font-family: var(--font-serif);
  font-size: 48px;
  font-weight: 500;
  line-height: 1;
  color: var(--accent-deep);
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.02em;
}
.narrative-hero .hero-text {
  flex: 1;
  display: flex; flex-direction: column;
  gap: 2px;
  padding-top: 4px;
}
.narrative-hero .hero-line {
  font-family: var(--font-serif);
  font-size: var(--fs-display);
  font-weight: 500;
  line-height: 1.15;
  color: var(--ink);
  letter-spacing: var(--ls-display);
}
.narrative-hero .hero-sub {
  font-family: var(--font-sans);
  font-size: var(--fs-body-sm);
  color: var(--ink-2);
  font-weight: 400;
  margin-top: 2px;
}

.narrative-mini-strip {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 6px;
  padding: 12px 0;
  border-top: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
  margin-bottom: 16px;
}
.mini-day {
  display: flex; flex-direction: column; align-items: center; gap: 6px;
}
.mini-day .mini-dow {
  font-family: var(--font-mono);
  font-size: var(--fs-caption);
  text-transform: uppercase;
  letter-spacing: var(--ls-caption);
  color: var(--muted);
}
.mini-day .mini-dot {
  width: 12px; height: 12px;
  border-radius: 50%;
  background: var(--c-empty);
  border: 1px solid transparent;
}
.mini-day[data-state="programmed"] .mini-dot { background: var(--c-programmed); }
.mini-day[data-state="light"]      .mini-dot { background: var(--c-light); }
.mini-day[data-state="rest"]       .mini-dot { background: var(--c-rest); }
.mini-day[data-state="empty"]      .mini-dot { background: transparent; border-color: var(--line-2); }
.mini-day.today .mini-dot {
  box-shadow: 0 0 0 3px var(--accent-soft);
}

.narrative-trends {
  display: flex; flex-direction: column;
  gap: 0;
  margin-bottom: 14px;
}
.trend-row {
  display: grid;
  grid-template-columns: 1fr auto auto;
  gap: 10px;
  align-items: baseline;
  padding: 10px 0;
  border-bottom: 1px dashed var(--line);
}
.trend-row:last-child { border-bottom: none; }
.trend-label {
  font-family: var(--font-mono);
  font-size: var(--fs-eyebrow);
  text-transform: uppercase;
  letter-spacing: var(--ls-eyebrow);
  color: var(--muted);
}
.trend-value {
  font-family: var(--font-sans);
  font-size: var(--fs-body);
  font-weight: 500;
  color: var(--ink);
  font-variant-numeric: tabular-nums;
}
.trend-delta {
  font-family: var(--font-mono);
  font-size: var(--fs-caption);
  text-transform: uppercase;
  letter-spacing: var(--ls-caption);
  color: var(--muted);
}
.trend-delta.good { color: var(--success); }
.trend-delta.flat { color: var(--muted); }

.narrative-notes p {
  font-family: var(--font-sans);
  font-size: var(--fs-body);
  color: var(--ink-2);
  margin: 0 0 8px;
  line-height: 1.45;
}
.narrative-notes p:last-child { margin-bottom: 0; }

/* ---------- Weekly snapshot table ---------- */
.snap-table {
  width: 100%;
  border-collapse: collapse;
  font-size: var(--fs-sm);
}
.snap-table th, .snap-table td {
  text-align: left;
  padding: 8px 6px;
  border-bottom: 1px solid var(--line);
  vertical-align: top;
}
.snap-table th {
  font-weight: 500;
  color: var(--muted);
  text-transform: uppercase;
  font-size: 11px;
  letter-spacing: 0.06em;
}
.snap-table td.num { font-variant-numeric: tabular-nums; }

/* ---------- Print-friendly view ---------- */
@media print {
  #top-bar, #bottom-tabs, .no-print, .modal-foot { display: none !important; }
  body { background: white; color: black; }
  .card { box-shadow: none; border-color: #ccc; page-break-inside: avoid; }
  .view { display: block !important; }
  main { padding: 0; }
  .chart-wrap { height: 180px; }
}

/* ---------- Misc ---------- */
.spacer-lg { height: 32px; }
.hr { border-top: 1px solid var(--line); margin: 24px 0; }
.muted { color: var(--muted); }
.italic { font-style: italic; }
.kv { display: flex; justify-content: space-between; gap: 10px; padding: 6px 0; }
.kv .k { color: var(--muted); }
.kv .v { color: var(--ink); font-weight: 500; }

a { color: var(--accent-deep); }

.first-run-step {
  padding: 30px 4px;
  display: flex; flex-direction: column;
  gap: 18px;
}
.first-run-step h2 {
  font-family: var(--font-serif);
  font-size: var(--fs-display);
  margin: 0;
  font-weight: 500;
}
.welcome-block {
  background: var(--accent-soft);
  border-radius: var(--radius);
  padding: 18px;
  color: var(--accent-deep);
  line-height: 1.5;
}
</style>
</head>
<body>

<div id="app-shell">

  <!-- ─── Top bar ─────────────────────────────────────────────────── -->
  <header id="top-bar">
    <h1 id="top-title">Today</h1>
    <div id="sync-status" title="Sync status">
      <span id="sync-dot"></span>
      <span id="sync-text"></span>
    </div>
    <button class="icon-btn" id="quick-log" aria-label="Quick log entry" title="Quick log">
      <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
    </button>
    <button class="icon-btn" id="open-settings" aria-label="Settings" title="Settings">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
  </header>

  <!-- ─── Main views ──────────────────────────────────────────────── -->
  <main>
    <section id="view-today" class="view active"></section>
    <section id="view-log"     class="view"></section>
    <section id="view-trends"  class="view"></section>
    <section id="view-guide"   class="view"></section>
    <section id="view-safety"  class="view"></section>
    <section id="view-settings" class="view"></section>
    <section id="view-print"   class="view"></section>
  </main>

  <!-- ─── Bottom tab nav ──────────────────────────────────────────── -->
  <nav id="bottom-tabs">
    <button data-view="today" class="active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12l9-9 9 9"/><path d="M5 10v10h14V10"/></svg>
      Today
    </button>
    <button data-view="log">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M7 9h10M7 13h10M7 17h6"/></svg>
      Log
    </button>
    <button data-view="trends">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 17l5-5 4 4 8-8"/><path d="M14 8h6v6"/></svg>
      Trends
    </button>
    <button data-view="guide">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h12a4 4 0 0 1 4 4v12"/><path d="M4 4v16h12a4 4 0 0 0 4-4"/></svg>
      Guide
    </button>
    <button data-view="safety" class="safety">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L4 6v6c0 5 3.5 9.4 8 10 4.5-.6 8-5 8-10V6z"/></svg>
      Safety
    </button>
  </nav>

  <!-- ─── Modal mount point ───────────────────────────────────────── -->
  <div id="modal-mount"></div>

</div>

<script>
/* ─── 4. Date + derived-data helpers ────────────────────────────── */

const DOW_SHORT = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const DOW_FULL  = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

function todayISO() {
  const d = new Date();
  const tz = d.getTimezoneOffset() * 60000;
  return new Date(d - tz).toISOString().slice(0, 10);
}
function isoFromDate(d) {
  const tz = d.getTimezoneOffset() * 60000;
  return new Date(d - tz).toISOString().slice(0, 10);
}
function dateFromIso(iso) {
  const [y, m, d] = iso.split('-').map(Number);
  return new Date(y, m - 1, d);
}
function addDays(iso, n) {
  const d = dateFromIso(iso);
  d.setDate(d.getDate() + n);
  return isoFromDate(d);
}
function dayOfWeek(iso) {
  return dateFromIso(iso).getDay();
}
function mondayOf(iso) {
  const d = dateFromIso(iso);
  const dow = d.getDay();
  const shift = dow === 0 ? -6 : 1 - dow; // shift to Monday
  d.setDate(d.getDate() + shift);
  return isoFromDate(d);
}
function fmtDate(iso) {
  if (!iso) return '';
  const d = dateFromIso(iso);
  const today = todayISO();
  if (iso === today) return 'Today';
  if (iso === addDays(today, -1)) return 'Yesterday';
  const opts = { month: 'short', day: 'numeric' };
  if (d.getFullYear() !== new Date().getFullYear()) opts.year = 'numeric';
  return d.toLocaleDateString(undefined, opts);
}
function fmtTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' });
}
function fmtDayHeading(iso) {
  if (iso === todayISO()) return 'Today';
  if (iso === addDays(todayISO(), -1)) return 'Yesterday';
  const d = dateFromIso(iso);
  return d.toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric' });
}
/** Label a week by its date range — "Jun 8 – 14" or "May 30 – Jun 5".
 *  Use this anywhere we're naming a *week*, not a *day* — `fmtDate`
 *  collapses today's date to "Today", which reads as nonsense when
 *  the date is actually a Monday at the start of a 7-day span. */
function fmtWeekRange(weekStartIso) {
  const start = dateFromIso(weekStartIso);
  const end = dateFromIso(addDays(weekStartIso, 6));
  const opts = { month: 'short', day: 'numeric' };
  if (start.getMonth() === end.getMonth() && start.getFullYear() === end.getFullYear()) {
    return `${start.toLocaleDateString(undefined, opts)} – ${end.getDate()}`;
  }
  return `${start.toLocaleDateString(undefined, opts)} – ${end.toLocaleDateString(undefined, opts)}`;
}
/** Short week-start label for table rows: "Mon, Jun 8". */
function fmtWeekStart(iso) {
  return dateFromIso(iso).toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' });
}
/** "This week" if the given week start is the current Monday, else a
 *  range label. Use for headings/eyebrows. */
function fmtWeekLabel(weekStartIso) {
  const thisMon = mondayOf(todayISO());
  const range = fmtWeekRange(weekStartIso);
  if (weekStartIso === thisMon) return `This week · ${range}`;
  if (weekStartIso === addDays(thisMon, -7)) return `Last week · ${range}`;
  return range;
}
function safeNum(v, fallback) {
  const n = Number(v);
  return Number.isFinite(n) ? n : (fallback === undefined ? null : fallback);
}
function asBool(v) {
  return v === true || v === 'true' || v === 1 || v === '1';
}
function escapeHtml(s) {
  if (s === null || s === undefined) return '';
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

/** All entries on a given date, across types. EKG/BS use dateTime
 *  (ISO), so we match by date prefix. */
function entriesOnDay(iso) {
  return {
    vitals: state.vitals.filter(v => v.date === iso),
    activity: state.activity.filter(a => a.date === iso),
    ekg: state.ekg.filter(e => (e.dateTime || '').slice(0, 10) === iso),
    bloodSugar: state.bloodSugar.filter(b => (b.dateTime || '').slice(0, 10) === iso),
    symptoms: (state.symptoms || []).filter(s => (s.dateTime || '').slice(0, 10) === iso)
  };
}

/** Day-strip state: programmed | light | rest | empty
 *  Any logged rest day — planned or taken because of symptoms —
 *  always counts as "kept up." */
function dayState(iso) {
  if ((state.config.restDays || []).includes(iso)) return 'rest';
  const e = entriesOnDay(iso);
  const hasProgrammed = e.activity.some(a => asBool(a.isProgrammed));
  if (hasProgrammed) return 'programmed';
  const anyEntry = e.activity.length > 0 || e.vitals.length > 0
    || e.ekg.length > 0 || e.bloodSugar.length > 0 || e.symptoms.length > 0;
  if (anyEntry) return 'light';
  return 'empty';
}

/** Streak = consecutive days back from today where state ≠ empty. */
function computeStreak() {
  let streak = 0;
  let cursor = todayISO();
  // Today only contributes if she has already done something today;
  // otherwise peek back from yesterday so the streak isn't shown as 0 at 8am.
  if (dayState(cursor) === 'empty') cursor = addDays(cursor, -1);
  for (let i = 0; i < 365; i++) {
    if (dayState(cursor) === 'empty') break;
    streak++;
    cursor = addDays(cursor, -1);
  }
  return streak;
}

/** Programmed-only metrics for a day */
function dayProgrammedMinutes(iso) {
  return entriesOnDay(iso).activity
    .filter(a => asBool(a.isProgrammed))
    .reduce((s, a) => s + (safeNum(a.totalMinutes, 0) || 0), 0);
}
function dayLongestContinuous(iso) {
  const rounds = entriesOnDay(iso).activity
    .filter(a => asBool(a.isProgrammed))
    .map(a => safeNum(a.minutesPerRound, 0) || 0);
  return rounds.length ? Math.max(...rounds) : 0;
}

/** Weekly snapshot (week starts Monday) */
function weekSnapshot(weekStartIso) {
  const days = Array.from({ length: 7 }, (_, i) => addDays(weekStartIso, i));
  let daysActive = 0;
  let longestContinuous = 0;
  const borgs = [];
  const hrs = [];
  let anySymptoms = false;
  let totalProgrammed = 0;
  days.forEach(d => {
    const e = entriesOnDay(d);
    const programmed = e.activity.filter(a => asBool(a.isProgrammed));
    if (programmed.length > 0 || dayState(d) === 'rest') daysActive++;
    programmed.forEach(a => {
      const lc = safeNum(a.minutesPerRound, 0) || 0;
      if (lc > longestContinuous) longestContinuous = lc;
      totalProgrammed += safeNum(a.totalMinutes, 0) || 0;
      const b = safeNum(a.borg);
      if (b !== null) borgs.push(b);
      if (asBool(a.dizzyDuring) || asBool(a.swellingDuring) || asBool(a.breathingDuring)) anySymptoms = true;
    });
    e.vitals.forEach(v => {
      const hr = safeNum(v.restingHR);
      if (hr !== null) hrs.push(hr);
      if (asBool(v.dizzy) || asBool(v.swelling) || asBool(v.breathing)) anySymptoms = true;
    });
    if (e.symptoms.length > 0) anySymptoms = true;
  });
  const typicalBorg = borgs.length
    ? Math.round((borgs.reduce((s, b) => s + b, 0) / borgs.length) * 10) / 10
    : null;
  return {
    weekStart: weekStartIso,
    daysActive,
    longestContinuous,
    totalProgrammed,
    typicalBorg,
    hrRange: hrs.length ? [Math.min(...hrs), Math.max(...hrs)] : null,
    anySymptoms
  };
}

/** Suggested session shape for today, based on stage + day-of-week plan */
function todaysSuggestion() {
  const stage = STAGES[state.config.currentStage] || STAGES[0];
  const dow = DOW_SHORT[dayOfWeek(todayISO())];
  const planText = state.config.weeklyPlan[dow] || '';
  return { stage, planText, dow };
}

/** Plan-derived home-screen reminders. Returns [] by design — every flag
 *  (HR out-of-range, weight gain, BS out-of-range) is now shown inline on
 *  the specific entry that triggered it (see entryMeta + the per-type
 *  range helpers below). The home screen stays calm; nothing is
 *  calculated against empty fields. */
function checkPlanReminders() {
  return [];
}

/** Look up the configured HR floor/ceiling. Returns null when nothing
 *  meaningful is set. Treats 0 as "not set" so any garbage values left
 *  by the earlier blank-save bug don't trigger anything. */
function hrRange() {
  const r = (state.config && state.config.doctorRanges) || {};
  const floor   = (r.hrFloor   == null || r.hrFloor   === 0) ? null : safeNum(r.hrFloor);
  const ceiling = (r.hrCeiling == null || r.hrCeiling === 0) ? null : safeNum(r.hrCeiling);
  if (floor === null && ceiling === null) return null;
  return { floor, ceiling };
}

/** Was this vitals entry's weight a "flagged" gain against the previous
 *  entry (day-over-day) or against an entry from ~7 days earlier? Returns
 *  a short label string or null. Only fires when weight tracking is on
 *  AND a threshold is set (>0). Day-flag wins over week-flag if both. */
function weightFlagForVitals(r) {
  if (!state.config.weightTrackingEnabled) return null;
  if (r.weight == null || r.weight === '') return null;
  const myW = safeNum(r.weight);
  if (myW === null || !r.date) return null;
  const th = thresholds();
  const dayTh  = (th.weightGainPerDayLb  > 0) ? th.weightGainPerDayLb  : null;
  const weekTh = (th.weightGainPerWeekLb > 0) ? th.weightGainPerWeekLb : null;
  if (dayTh === null && weekTh === null) return null;

  const priorWeights = state.vitals
    .filter(v => v.id !== r.id && v.weight != null && v.weight !== '' && v.date && v.date < r.date)
    .sort((a, b) => (a.date || '').localeCompare(b.date || ''));
  if (priorWeights.length === 0) return null;

  // Day-over-day → compare to the most recent prior entry
  if (dayTh !== null) {
    const prior = priorWeights[priorWeights.length - 1];
    const priorW = safeNum(prior.weight);
    if (priorW !== null) {
      const diff = myW - priorW;
      if (diff >= dayTh) return `↑ ${diff.toFixed(1)} lb day-over-day`;
    }
  }
  // Week-over-week → oldest entry within the last 7 days from this entry
  if (weekTh !== null) {
    const weekAgoCut = addDays(r.date, -7);
    const old = priorWeights.find(w => w.date >= weekAgoCut);
    if (old) {
      const oldW = safeNum(old.weight);
      if (oldW !== null) {
        const diff = myW - oldW;
        if (diff >= weekTh) return `↑ ${diff.toFixed(1)} lb this week`;
      }
    }
  }
  return null;
}

/** Look up the configured low/high range for a BS context. Returns null
 *  when nothing is set OR when only 0s are stored (defensive: earlier
 *  versions saved 0 instead of null on blank inputs). */
function bsRangeForContext(ctx) {
  const r = (state.config && state.config.doctorRanges) || {};
  const key = ctx === 'fasting' ? 'bsFasting'
            : ctx === 'post-meal' ? 'bsPostMeal'
            : ctx === 'bedtime' ? 'bsBedtime'
            : null;
  if (!key || !r[key]) return null;
  const low  = (r[key].low  == null || r[key].low  === 0) ? null : safeNum(r[key].low);
  const high = (r[key].high == null || r[key].high === 0) ? null : safeNum(r[key].high);
  if (low === null && high === null) return null;
  return { low, high };
}

/** Ids of ekg records that were logged inside a vitals or symptom entry.
 *  Combined lists hide these rows — the parent entry's subtitle already
 *  shows the reading — but the Log → EKG filter, the charts, and the
 *  weekly print still see every reading. */
function linkedEkgIds() {
  const ids = new Set();
  state.vitals.forEach(v => { if (v.morningEkgId) ids.add(v.morningEkgId); });
  (state.symptoms || []).forEach(s => { if (s.ekgId) ids.add(s.ekgId); });
  return ids;
}

function renderRecentEntries() {
  const linked = linkedEkgIds();
  const all = collectAllEntries()
    .filter(it => it.type !== 'ekg' || !linked.has(it.record.id))
    .slice(0, 8);
  if (all.length === 0) {
    return `<div class="card soft small italic">Nothing logged yet — tap one of the buttons above to begin.</div>`;
  }
  return all.map(entryRowHtml).join('');
}

/** Flatten all entry types into a single sorted list, newest first. */
function collectAllEntries() {
  const items = [];
  state.vitals.forEach(v => items.push({ type: 'vitals', sortKey: v.date + 'T23:59', record: v }));
  state.activity.forEach(a => items.push({ type: 'activity', sortKey: a.date + 'T12:00', record: a }));
  state.ekg.forEach(e => items.push({ type: 'ekg', sortKey: e.dateTime || '', record: e }));
  state.bloodSugar.forEach(b => items.push({ type: 'bloodSugar', sortKey: b.dateTime || '', record: b }));
  (state.symptoms || []).forEach(s => items.push({ type: 'symptoms', sortKey: s.dateTime || '', record: s }));
  items.sort((a, b) => b.sortKey.localeCompare(a.sortKey));
  return items;
}

function entryRowHtml(item) {
  const { type, record } = item;
  const meta = entryMeta(type, record);
  const dateIso = (record.date || (record.dateTime || '').slice(0, 10));
  return `
    <div class="entry-row" onclick="openDayDetail('${dateIso}')">
      <div class="entry-icon">${entryIcon(type, record)}</div>
      <div class="entry-body">
        <div class="entry-title">${escapeHtml(meta.title)}</div>
        <div class="entry-meta">${escapeHtml(meta.subtitle)}</div>
      </div>
      <div class="entry-time">${escapeHtml(meta.timeStr)}</div>
    </div>

}

function entryIcon(type, record) {

      return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="16.5" cy="8" r="1.5"/><path d="M5 12l4.5-2.5 3.5 2.5-2 2.5"/><path d="M3 17c1.5 1 3 1 4.5 0c1.5-1 3-1 4.5 0c1.5 1 3 1 4.5 0c1.5-1 3-1 4.5 0"/></svg>`;

    return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="5" r="2"/><path d="M9 22l3-6 3 6M6 12l3 2 3-5 4 5 2-2"/></svg>`;
  }
  if (type === 'ekg')      return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M6.5 12h2l1.5-2.5 2 5 1.5-2.5h4"/></svg>`;
  if (type === 'bloodSugar') return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 2c4 6 7 9 7 13a7 7 0 0 1-14 0c0-4 3-7 7-13z"/></svg>`;
  if (type === 'symptoms') return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M12 11v4M10 13h4"/></svg>`;
  return '';
}

function entryMeta(type, r) {
  if (type === 'vitals') {
    const bits = [];
    if (r.restingHR) {
      // Inline HR out-of-range marker. Empty range fields stay quiet.
      const range = hrRange();
      const hr = safeNum(r.restingHR);
      let mark = '';
      if (range && hr !== null) {
        if (range.floor   != null && hr < range.floor)   mark = ' (below range)';
        if (range.ceiling != null && hr > range.ceiling) mark = ' (above range)';
      }
      bits.push(`HR ${r.restingHR}${mark}`);
    }
    if (r.morningEkgId) {
      const k = state.ekg.find(e => e.id === r.morningEkgId);
      if (k && (k.rhythm || k.rate)) {
        bits.push(`EKG ${k.rhythm || ''}${k.rate ? (k.rhythm ? ', ' : '') + k.rate + ' bpm' : ''}`);
      }
    }
    if (r.weight && state.config.weightTrackingEnabled) {
      const flag = weightFlagForVitals(r);
      bits.push(`${r.weight} lb${flag ? ' (' + flag + ')' : ''}`);
    }
    const sx = [];
    if (asBool(r.dizzy)) sx.push('dizzy');
    if (asBool(r.swelling)) sx.push('swelling');
    if (asBool(r.breathing)) sx.push('breathing');
    if (sx.length) bits.push(sx.join(', '));
    return { title: 'Morning vitals', subtitle: bits.join(' · '), timeStr: fmtDate(r.date) };
  }
  if (type === 'activity') {
    const cat = ACTIVITY_CATEGORIES[r.category] || { label: r.category };
    if (r.category === 'rest') return { title: 'Rest day', subtitle: '', timeStr: fmtDate(r.date) };
    const subs = Array.isArray(r.subtypes) ? r.subtypes : (typeof r.subtypes === 'string' ? safeParseArray(r.subtypes) : []);
    const subStr = subs.join(', ');
    const mins = r.totalMinutes ? `${r.totalMinutes} min` : '';
    const rounds = r.rounds && r.rounds > 1 ? ` (${r.rounds} × ${r.minutesPerRound})` : '';
    return {
      title: `${cat.label}${subStr ? ': ' + subStr : ''}`,
      subtitle: `${mins}${rounds}${r.borg ? ' · Borg ' + r.borg : ''}`,
      timeStr: fmtDate(r.date)
    };
  }
  if (type === 'ekg') {
    return {
      title: `EKG — ${r.rhythm || 'reading'}`,
      subtitle: `${r.rate ? r.rate + ' bpm' : ''}${asBool(r.symptomatic) ? ' · symptomatic' : ''}`,
      timeStr: `${fmtDate((r.dateTime || '').slice(0,10))} ${fmtTime(r.dateTime)}`
    };
  }
  if (type === 'bloodSugar') {
    // Inline out-of-range marker — only present when the user has actually
    // configured a low/high for this context. Empty fields stay empty.
    const range = bsRangeForContext(r.context);
    const v = safeNum(r.value);
    let marker = '';
    if (range && v !== null) {
      if (range.low != null && v < range.low)   marker = ' (below range)';
      if (range.high != null && v > range.high) marker = ' (above range)';
    }
    return {
      title: `Blood sugar — ${r.value}${marker}`,
      subtitle: r.context || '',
      timeStr: `${fmtDate((r.dateTime || '').slice(0,10))} ${fmtTime(r.dateTime)}`
    };
  }
  if (type === 'symptoms') {
    const sx = SYMPTOM_FIELDS.filter(([k]) => asBool(r[k]))
      .map(([k, , short]) => short);
    const bits = [];
    if (r.ekgId) {
      const k = state.ekg.find(e => e.id === r.ekgId);
      if (k) bits.push(`EKG taken: ${k.rhythm || 'reading'}${k.rate ? ' · ' + k.rate + ' bpm' : ''}`);
    }
    if (r.note) bits.push(r.note);
    return {
      title: 'Symptoms' + (sx.length ? ' — ' + sx.join(', ') : ''),
      subtitle: bits.join(' · '),
      timeStr: `${fmtDate((r.dateTime || '').slice(0,10))} ${fmtTime(r.dateTime)}`
    };
  }
  return { title: '', subtitle: '', timeStr: '' };
}

function safeParseArray(s) {
  try { const x = JSON.parse(s); return Array.isArray(x) ? x : []; }
  catch (e) { return s.split(',').map(t => t.trim()).filter(Boolean); }
}

function markRestDay(iso) {
  const list = state.config.restDays || [];
  if (!list.includes(iso)) {
    setConfig({ restDays: [...list, iso] });
  }
  renderActiveView();
}
function unmarkRestDay(iso) {
  const list = (state.config.restDays || []).filter(d => d !== iso);
  setConfig({ restDays: list });
  renderActiveView();
}
</script>

<script>
/* ─── 5c. Trends view + charts ──────────────────────────────────── */

let trendsRange = 28;       // days
let trendsTab = 'snapshot'; // snapshot | charts | calendar — snapshot is the default
let calendarMonth = null;   // 'YYYY-MM' — lazily initialized to current month on first render
let chartsShowRolling = false; // toggled by the Charts-tab "rolling avg" switch

const chartInstances = new Map(); // canvasId -> Chart

function destroyChart(id) {
  const c = chartInstances.get(id);
  if (c) { try { c.destroy(); } catch(e){} chartInstances.delete(id); }
}

function renderTrends() {
  const root = document.getElementById('view-trends');
  root.innerHTML = `
    <h2 class="view-title">Trends</h2>

    <div class="chips" style="margin-bottom:16px;">
      <button class="chip ${trendsTab==='snapshot'?'selected':''}" onclick="setTrendsTab('snapshot')">Weekly snapshot</button>
      <button class="chip ${trendsTab==='charts'?'selected':''}" onclick="setTrendsTab('charts')">Charts</button>
      <button class="chip ${trendsTab==='calendar'?'selected':''}" onclick="setTrendsTab('calendar')">Calendar</button>
    </div>

    ${trendsTab === 'charts' ? `

        <div class="chips" style="margin:0;">
          ${[[14,'2 wk'], [28,'4 wk'], [90,'3 mo'], [365,'1 yr']].map(([n,l]) => `
            <button class="chip ${trendsRange===n?'selected':''}" onclick="setTrendsRange(${n})">${l}</button>

        </div>

        <div class="chart-wrap"><canvas id="ch-hr"></canvas></div>
      </div>

      <div class="card chart-card">
        <h4>Activity minutes per day</h4>
        <div class="subtitle">Programmed activity only, stacked by type. Daily-activities not counted here.</div>

        <div class="chart-wrap"><canvas id="ch-longest"></canvas></div>
      </div>

      <div class="card chart-card">
        <h4>Borg perceived effort</h4>
        <div class="subtitle">Same work feeling easier over time means real fitness gain.</div>
        <div class="chart-wrap"><canvas id="ch-borg"></canvas></div>
      </div>

        <div class="subtitle">Color-coded by context. Tap a point for the exact value.</div>

      </div>

      ${state.config.weightTrackingEnabled ? `
        <div class="card chart-card">
          <h4>Morning weight</h4>
          <div class="subtitle">Baseline: ${state.config.weightBaselineLb ? state.config.weightBaselineLb + ' lb' : 'not set'}</div>
          <div class="chart-wrap"><canvas id="ch-weight"></canvas></div>
        </div>
      ` : ''}
    ` : trendsTab === 'calendar' ? renderCalendarPanel()
      : renderWeeklySnapshotPanel()}

    <div class="spacer-lg"></div>
  `;

  if (trendsTab === 'charts') {
    // Defer so canvases are in DOM before Chart.js measures them
    setTimeout(drawAllCharts, 0);
  }
  if (trendsTab === 'calendar') {
    // Wire up day-cell taps to open the same day-detail modal the strip uses
    root.querySelectorAll('.cal-cell[data-iso]').forEach(el => {
      el.addEventListener('click', () => openDayDetail(el.dataset.iso));
    });
  }
}

function setTrendsRange(n) { trendsRange = n; renderTrends(); }
function setTrendsTab(t) { trendsTab = t; renderTrends(); }
function toggleChartsRolling() { chartsShowRolling = !chartsShowRolling; renderTrends(); }

/** 7-day trailing rolling mean over an array of numbers/nulls. Returns
 *  an array of the same length: each index i is the mean of the last
 *  `window` non-null entries up to and including i, or null if there
 *  are no values in that window. Used to overlay a smoothed line on
 *  the noisy daily charts. */
function rollingMean(arr, window) {
  window = window || 7;
  const out = new Array(arr.length).fill(null);
  for (let i = 0; i < arr.length; i++) {
    const start = Math.max(0, i - window + 1);
    let sum = 0, n = 0;
    for (let j = start; j <= i; j++) {
      if (arr[j] != null && !isNaN(arr[j])) { sum += arr[j]; n++; }
    }
    if (n > 0) out[i] = Math.round((sum / n) * 10) / 10;
  }
  return out;
}

/** Build a smoothed overlay dataset for a daily numeric series. Caller
 *  should fade the underlying daily series (lower opacity, smaller points)
 *  when this is in use. */
function rollingOverlayDataset(theme, label, data, color) {
  color = color || theme.ink;
  return {
    label: '7-day avg — ' + label,
    data: rollingMean(data, 7),
    borderColor: color,
    backgroundColor: 'transparent',
    borderWidth: 2.5,
    tension: 0.4,
    cubicInterpolationMode: 'monotone',
    spanGaps: true,
    pointRadius: 0,
    pointHoverRadius: 3,
    fill: false,
    order: -1   // draw on top of the faded daily series
  };
}

/* ─── Calendar heatmap ──────────────────────────────────────────────
 *  Month grid colored by dayState. Title shows the month; arrows step.
 *  Tapping a cell opens the day-detail modal (same one the Today strip
 *  uses). "Other-month" cells render in low opacity so the grid stays
 *  rectangular but the focus is the selected month. */

function currentCalendarMonth() {
  if (calendarMonth) return calendarMonth;
  const t = todayISO();
  return calendarMonth = t.slice(0, 7); // YYYY-MM
}

function stepCalendarMonth(delta) {
  const cur = currentCalendarMonth();
  const [y, m] = cur.split('-').map(Number);
  const d = new Date(y, m - 1 + delta, 1);
  calendarMonth = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
  renderTrends();
}

function renderCalendarPanel() {
  const ym = currentCalendarMonth();
  const [y, m] = ym.split('-').map(Number);
  const first = new Date(y, m - 1, 1);
  const monthLabel = first.toLocaleDateString(undefined, { month: 'long', year: 'numeric' });

  // Grid starts on Monday. JS: getDay() Sun=0..Sat=6 → shift so Mon=0.
  const firstDow = (first.getDay() + 6) % 7;
  const gridStart = new Date(y, m - 1, 1 - firstDow);
  const today = todayISO();

  // 6 rows × 7 cols always — keeps the grid height stable across months
  const cells = [];
  for (let i = 0; i < 42; i++) {
    const d = new Date(gridStart.getFullYear(), gridStart.getMonth(), gridStart.getDate() + i);
    const iso = isoFromDate(d);
    const inMonth = d.getMonth() === m - 1;
    const st = dayState(iso);
    const mins = inMonth ? totalActivityMinutesOnDay(iso) : 0;
    const isToday = iso === today;
    const tooltip = inMonth ? calendarCellTooltip(iso) : '';
    cells.push({ iso, day: d.getDate(), inMonth, st, mins, isToday, tooltip });
  }

  const dowLabels = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

  return `
    <div class="card">
      <div class="cal-head">
        <button class="cal-nav" onclick="stepCalendarMonth(-1)" aria-label="Previous month">‹</button>
        <div class="cal-title">${escapeHtml(monthLabel)}</div>
        <button class="cal-nav" onclick="stepCalendarMonth(1)" aria-label="Next month">›</button>
      </div>
      <div class="cal-grid">
        ${dowLabels.map(d => `<div class="cal-dow">${d}</div>`).join('')}
        ${cells.map(c => `
          <button class="cal-cell ${c.inMonth ? '' : 'other-month'} ${c.isToday ? 'today' : ''}"
                  data-state="${c.st}"
                  ${c.inMonth ? `data-iso="${c.iso}"` : ''}
                  ${c.inMonth ? `title="${escapeHtml(c.tooltip)}"` : ''}
                  ${c.inMonth ? '' : 'disabled'}>
            <span class="cal-num">${c.day}</span>
            ${c.inMonth && c.mins > 0 ? `<span class="cal-mins">${c.mins}m</span>` : ''}
          </button>
        `).join('')}
      </div>
      <div class="legend" style="margin-top:14px;">
        <span><span class="swatch" style="background:var(--c-programmed)"></span>Programmed</span>
        <span><span class="swatch" style="background:var(--c-light)"></span>Light day</span>
        <span><span class="swatch" style="background:var(--c-rest)"></span>Rest day</span>
        <span><span class="swatch" style="background:var(--panel); border:1px solid var(--line)"></span>Empty</span>
      </div>
      <p class="small italic" style="margin-top:8px;">Tap a day for the full entry.</p>
    </div>
  `;
}

/** Sum of programmed minutes on a day. Used as the small caption inside each
 *  calendar cell. We use programmed (not all activity) so a day with daily
 *  housework doesn't read as a "30 min session" day. */
function totalActivityMinutesOnDay(iso) {
  return entriesOnDay(iso).activity
    .filter(a => asBool(a.isProgrammed))
    .reduce((s, a) => s + (safeNum(a.totalMinutes, 0) || 0), 0);
}

/** Cell tooltip — short, one-line summary of the day's activity. */
function calendarCellTooltip(iso) {
  const e = entriesOnDay(iso);
  const st = dayState(iso);
  if (st === 'rest') return `${fmtDayHeading(iso)} — rest day`;
  const acts = e.activity.filter(a => a.category !== 'rest');
  if (acts.length === 0) return `${fmtDayHeading(iso)} — no activity`;
  const parts = acts.map(a => {
    const cat = ACTIVITY_CATEGORIES[a.category];
    const label = cat ? cat.label : a.category;
    return a.totalMinutes ? `${label} ${a.totalMinutes}m` : label;
  });
  return `${fmtDayHeading(iso)} — ${parts.join(', ')}`;
}

/** Common chart options — calm theme, tap-friendly tooltips. */
function chartTheme() {
  const css = getComputedStyle(document.documentElement);
  const get = n => css.getPropertyValue(n).trim();
  return {
    ink:     get('--ink'),
    ink2:    get('--ink-2'),
    line:    get('--line'),
    muted:   get('--muted'),
    accent:  get('--accent'),
    panel:   get('--panel'),
    success: get('--success'),
    signal:  get('--signal')
  };
}

/** Range-aware point + line sizing. Longer ranges = denser data =
 *  smaller marks so the chart stays legible. */
function chartDensity() {
  const r = trendsRange;
  if (r <= 14) return { point: 4,   hover: 7, line: 2   };
  if (r <= 28) return { point: 3,   hover: 6, line: 1.8 };
  if (r <= 90) return { point: 2,   hover: 5, line: 1.5 };
  return         { point: 1.5, hover: 4, line: 1.2 };
}

/** Legend that grays out hidden datasets instead of striking them through.
 *  Default Chart.js draws a strike line through the label when an entry
 *  is toggled off; this generator keeps text upright but fades the swatch
 *  and text to muted so the off state still reads at a glance. */
function legendWithGrayOut(theme, base = {}) {
  return {
    display: true,
    position: 'bottom',
    ...base,
    labels: {
      color: theme.ink2,
      font: { size: 11 },
      boxWidth: 10,
      padding: 12,
      ...(base.labels || {}),
      generateLabels: (chart) => {
        const items = Chart.defaults.plugins.legend.labels.generateLabels(chart);
        items.forEach((item) => {
          const visible = chart.isDatasetVisible(item.datasetIndex);
          if (!visible) {
            item.fillStyle   = theme.muted + '33';   // faded swatch fill
            item.strokeStyle = theme.muted + '88';   // faded swatch ring
            item.fontColor   = theme.muted;          // muted text
            item.hidden      = false;                // suppresses strikethrough
          }
        });
        return items;
      }
    }
  };
}

/** Distinct palette per home-device rhythm label. Picked for clear
 *  separation at a glance — five hues spread across the color wheel
 *  with enough saturation to read distinctly against the chart. */
function rhythmPalette(theme) {
  return {
    normal:       '#3e9e5e',  // clear green — all clear
    afib:         '#e08a2e',  // clear amber/orange — attention
    bradycardia:  '#3382c8',  // clear blue — slow rate
    tachycardia:  '#d04848',  // clear rust — fast rate
    unclassified: '#7e7e84'   // mid neutral gray
  };
}

function rangeDays() {
  const today = todayISO();
  return Array.from({ length: trendsRange }, (_, i) => addDays(today, -(trendsRange - 1 - i)));
}

function drawAllCharts() {
  if (window.__chartCdnFailed || typeof Chart === 'undefined') {
    document.querySelectorAll('.chart-wrap').forEach(w => {
      w.innerHTML = '<div class="chart-empty">Charts unavailable — no internet for chart library.</div>';
    });
    return;
  }
  drawHrChart();
  drawMinutesChart();
  drawLongestChart();
  drawBorgChart();
  drawBsChart();
  if (state.config.weightTrackingEnabled) drawWeightChart();
}

function emptyHtml(canvasId, msg) {
  const c = document.getElementById(canvasId);
  if (!c) return;
  destroyChart(canvasId);
  c.parentElement.innerHTML = `<div class="chart-empty">${escapeHtml(msg)}</div>`;
}

function commonOpts(theme, extra = {}) {
  return {
    responsive: true,
    maintainAspectRatio: false,
    animation: { duration: 0 },
    interaction: { mode: 'nearest', intersect: false },
    plugins: {
      legend: { display: false, labels: { color: theme.ink2 } },
      tooltip: {
        backgroundColor: theme.panel,
        titleColor: theme.ink,
        bodyColor: theme.ink2,
        borderColor: theme.line,
        borderWidth: 1,
        padding: 10,
        cornerRadius: 8,
        displayColors: true,
        ...extra.tooltip
      },
      ...extra.plugins
    },
    scales: extra.scales || {
      x: {
        ticks: { color: theme.muted, font: { size: 10 }, maxRotation: 0, autoSkip: true, autoSkipPadding: 16 },
        grid:  { color: theme.line, drawBorder: false }
      },
      y: {
        ticks: { color: theme.muted, font: { size: 10 } },
        grid:  { color: theme.line, drawBorder: false }
      }
    }
  };
}

function drawHrChart() {
  const t = chartTheme();
  const dens = chartDensity();
  const palette = rhythmPalette(t);
  const days = rangeDays();

  // Morning HR (one value per day)
  const hrByDay = new Map();
  state.vitals.forEach(v => {
    if (v.date && v.restingHR != null && v.restingHR !== '') {
      hrByDay.set(v.date, safeNum(v.restingHR));
    }
  });
  const hrData = days.map(d => hrByDay.has(d) ? hrByDay.get(d) : null);

  // Recovery HR — best (lowest) post-session pulse per day. Lower = faster
  // recovery, so when this trends down the fitness gain is real. Treat 0 as
  // "not measured" (defensive — earlier versions stored 0 on blank submit).
  const recByDay = new Map();
  state.activity.forEach(a => {
    if (!a.date || a.recoveryHR == null || a.recoveryHR === '') return;
    const v = safeNum(a.recoveryHR);
    if (v === null || v <= 0) return;
    const cur = recByDay.get(a.date);
    if (cur == null || v < cur) recByDay.set(a.date, v);
  });
  const recData = days.map(d => recByDay.has(d) ? recByDay.get(d) : null);
  const hasRecovery = recData.some(v => v != null);

  // EKG events grouped by day
  const ekgByDay = new Map();
  state.ekg.forEach(e => {
    const d = (e.dateTime || '').slice(0, 10);
    if (!d) return;
    if (!ekgByDay.has(d)) ekgByDay.set(d, []);
    ekgByDay.get(d).push(e);
  });

  // One dataset per rhythm — each only has data on days where that
  // rhythm appears. Empty rhythms are dropped so the legend stays clean.
  const RHYTHMS = ['normal', 'afib', 'bradycardia', 'tachycardia', 'unclassified'];
  const ekgDotRadius = Math.min(dens.point + 3, 7);
  const ekgDatasets = RHYTHMS.map(rhythm => {
    const data = days.map(d => {
      if (!ekgByDay.has(d)) return null;
      const events = ekgByDay.get(d).filter(e => (e.rhythm || 'unclassified') === rhythm);
      return events.length ? safeNum(events[0].rate) : null;
    });
    if (data.every(v => v == null)) return null;
    return {
      label: `EKG · ${rhythm}`,
      data,
      showLine: false,
      pointRadius: ekgDotRadius,
      pointHoverRadius: ekgDotRadius + 2,
      pointStyle: 'rectRot',
      pointBorderWidth: 1.8,
      pointHoverBorderWidth: 2.2,
      pointBorderColor: palette[rhythm],
      pointBackgroundColor: palette[rhythm] + 'cc',   // 80% alpha fill, solid ring
      // Dataset-level color so the legend marker picks up the rhythm color
      // (Chart.js' auto-generated legend reads borderColor/backgroundColor
      //  here, not pointBorderColor/pointBackgroundColor.)
      borderColor: palette[rhythm],
      backgroundColor: palette[rhythm] + 'cc'
    };
  }).filter(Boolean);

  if (hrData.every(v => v == null) && !hasRecovery && ekgDatasets.length === 0) {
    emptyHtml('ch-hr', 'No heart rate data yet.');
    return;
  }
  destroyChart('ch-hr');
  const ctx = document.getElementById('ch-hr');
  if (!ctx) return;
  const chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: days.map(fmtDate),
      datasets: [
        {
          label: 'Resting HR',
          data: hrData,
          borderColor: t.accent + (chartsShowRolling ? '55' : ''),
          backgroundColor: t.accent + (chartsShowRolling ? '11' : '22'),
          borderWidth: dens.line,
          tension: 0.35,
          cubicInterpolationMode: 'monotone',
          spanGaps: true,
          pointRadius: chartsShowRolling ? 0 : dens.point,
          pointHoverRadius: dens.hover,
          pointBackgroundColor: t.accent + 'cc',
          pointBorderColor: t.accent,
          pointBorderWidth: 1.5,
          pointHoverBorderWidth: 2
        },
        ...(hasRecovery ? [{
          label: 'Recovery HR (1 min post)',
          data: recData,
          borderColor: '#b06b8c' + (chartsShowRolling ? '55' : ''),
          backgroundColor: '#b06b8c' + (chartsShowRolling ? '11' : '22'),
          borderWidth: dens.line,
          borderDash: [4, 4],
          tension: 0.35,
          cubicInterpolationMode: 'monotone',
          spanGaps: true,
          pointRadius: chartsShowRolling ? 0 : dens.point,
          pointHoverRadius: dens.hover,
          pointBackgroundColor: '#b06b8ccc',
          pointBorderColor: '#b06b8c',
          pointBorderWidth: 1.5,
          pointHoverBorderWidth: 2
        }] : []),
        ...(chartsShowRolling ? [
          rollingOverlayDataset(t, 'Resting', hrData, t.accent),
          ...(hasRecovery ? [rollingOverlayDataset(t, 'Recovery', recData, '#b06b8c')] : [])
        ] : []),
        ...ekgDatasets
      ]
    },
    options: commonOpts(t, {
      plugins: {
        legend: legendWithGrayOut(t)
      },
      tooltip: {
        callbacks: {
          label: (item) => {
            const ds = item.dataset.label;
            const v = item.parsed.y;
            if (ds === 'Resting HR') return `Resting HR: ${v} bpm`;
            if (ds.startsWith('EKG · ')) {
              const rhythm = ds.replace('EKG · ', '');
              const d = days[item.dataIndex];
              const ev = (ekgByDay.get(d) || []).filter(e => (e.rhythm || 'unclassified') === rhythm)[0];
              return `${rhythm}${ev && asBool(ev.symptomatic) ? ' (symptomatic)' : ''}: ${v} bpm${ev && ev.note ? ' — ' + ev.note : ''}`;
            }
            return `${ds}: ${v}`;
          }
        }
      }
    })
  });
  chartInstances.set('ch-hr', chart);
}

function drawMinutesChart() {
  const t = chartTheme();

  // Per-day per-category programmed minutes
  const cats = ['pool', 'walking', 'strength', 'balance'];

    strength: '#b9a07e',
    balance:  '#9bb59b'

  const datasets = cats.map(cat => ({
    label: ACTIVITY_CATEGORIES[cat].label,

      state.activity
        .filter(a => a.date === d && a.category === cat)
        .reduce((s, a) => s + (safeNum(a.totalMinutes, 0) || 0), 0)
    ),
    backgroundColor: catColors[cat],
    borderColor: catColors[cat],
    borderWidth: 0,
    borderRadius: 2,

        y: { stacked: true, beginAtZero: true, ticks: { color: t.muted, font: { size: 10 } }, grid: { color: t.line }, title: { display: true, text: 'minutes', color: t.muted, font: { size: 10 } } }

function drawBorgChart() {
  const t = chartTheme();
  const dens = chartDensity();
  const days = rangeDays();
  // Average Borg per day across programmed activities
  const data = days.map(d => {
    const bs = state.activity
      .filter(a => a.date === d && asBool(a.isProgrammed) && a.borg != null && a.borg !== '')
      .map(a => safeNum(a.borg));
    if (bs.length === 0) return null;
    return Math.round((bs.reduce((s, b) => s + b, 0) / bs.length) * 10) / 10;

function drawBsChart() {
  const t = chartTheme();
  const dens = chartDensity();
  const colors = {
    'fasting':   '#7a9bbd',
    'pre-meal':  '#c9a86a',
    'post-meal': '#b56e6e',
    'bedtime':   '#8c7aa8'
  };
  const cutoff = addDays(todayISO(), -trendsRange + 1);
  const points = state.bloodSugar
    .filter(b => (b.dateTime || '').slice(0,10) >= cutoff)
    .sort((a, b) => (a.dateTime || '').localeCompare(b.dateTime || ''));
  if (points.length === 0) {
    emptyHtml('ch-bs', 'No blood sugar readings yet.');
    return;
  }
  // Numeric x-axis (epoch ms) with a tick-formatter — avoids needing
  // chartjs-adapter-date-fns at runtime, and lets us set explicit
  // min/max so the axis rescales when the range chips change.
  const ctxs = BS_CONTEXTS;
  const datasets = ctxs.map(c => ({
    label: c,
    data: points.filter(p => p.context === c).map(p => ({
      x: new Date(p.dateTime).getTime(),
      y: safeNum(p.value),
      note: p.note,
      whenLabel: fmtDate((p.dateTime || '').slice(0,10)) + ' ' + fmtTime(p.dateTime)
    })),
    borderColor: colors[c],
    backgroundColor: colors[c] + '22',
    borderWidth: dens.line,
    pointRadius: dens.point + 1,
    pointHoverRadius: dens.hover + 1,
    pointBackgroundColor: colors[c] + 'cc',
    pointBorderColor: colors[c],
    pointBorderWidth: 1.5,
    pointHoverBorderWidth: 2,
    showLine: true,
    spanGaps: true,
    tension: 0.3,
    cubicInterpolationMode: 'monotone'
  })).filter(ds => ds.data.length > 0);

  // Explicit x-range = the selected range chip, so axis spans the
  // whole range even if data only covers part of it.
  const xMin = new Date(cutoff + 'T00:00:00').getTime();
  const xMax = new Date(todayISO() + 'T23:59:59').getTime();

  // Tick density also flexes with the range — fewer ticks on wider ranges
  const xTickStep = trendsRange <= 14 ? 2
                  : trendsRange <= 28 ? 4
                  : trendsRange <= 90 ? 14
                  : 30;

  destroyChart('ch-bs');
  const ctx = document.getElementById('ch-bs');
  if (!ctx) return;
  const chart = new Chart(ctx, {
    type: 'scatter',
    data: { datasets },
    options: commonOpts(t, {
      scales: {
        x: {
          type: 'linear',
          min: xMin,
          max: xMax,
          ticks: {
            color: t.muted, font: { size: 10 }, maxRotation: 0,
            autoSkip: true, maxTicksLimit: Math.min(8, Math.ceil(trendsRange / xTickStep)),
            callback: (v) => {
              const d = new Date(v);
              return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
            }
          },
          grid: { color: t.line }
        },
        y: { beginAtZero: false, ticks: { color: t.muted, font: { size: 10 } }, grid: { color: t.line }, title: { display: true, text: 'mg/dL', color: t.muted, font: { size: 10 } } }
      },
      plugins: {
        legend: legendWithGrayOut(t, { labels: { boxWidth: 8 } }),
        tooltip: {
          backgroundColor: t.panel,
          titleColor: t.ink,
          bodyColor: t.ink2,
          borderColor: t.line,
          borderWidth: 1,
          callbacks: {
            title: (items) => items.length ? items[0].raw.whenLabel : '',
            label: (item) => `${item.dataset.label}: ${item.raw.y}${item.raw.note ? ' — ' + item.raw.note : ''}`
          }
        }
      }
    })
  });
  chartInstances.set('ch-bs', chart);
}
